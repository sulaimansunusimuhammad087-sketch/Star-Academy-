<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body { font-family:Arial; background:#0a0a0f; color:white; text-align:center; }
.card { background:#16161f; padding:20px; max-width:600px; margin:auto; border-radius:10px; }
input,button { width:100%; padding:10px; margin-top:10px; }
button { background:#00e5c0; border:none; font-weight:bold; }
a{color:#00e5c0;}
</style>
</head>

<body>

<div class="card">

<h2>STUDENT PORTAL</h2>

<a href="index.html">← Back Home</a>

<input id="studentID" placeholder="Enter Student ID">
<button onclick="getResult()">View Result</button>

<div id="output"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* RESULT FIXED */
window.getResult = async function(){

let id = studentID.value;

const q = query(collection(db,"students"), where("studentID","==",id));
const snap = await getDocs(q);

if(snap.empty){
output.innerHTML = "<h3 style='color:red'>No result found</h3>";
return;
}

snap.forEach(doc=>{
let d = doc.data();

output.innerHTML = `
<h3>${d.name}</h3>
<p>Department: ${d.dept}</p>
<p>Status: ACTIVE</p>
`;
});

};

</script>

</body>
</html>
