<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}

.card{
max-width:850px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #444;
padding:8px;
text-align:center;
}
</style>
</head>

<body>

<div class="overlay">

<div class="card">

<h2>Student Result Check</h2>

<input id="sid" placeholder="Student ID">

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session">

<button onclick="viewResult()">View Result</button>

<div id="box"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db = getFirestore(app);

window.viewResult = async ()=>{

let id = sid.value.trim();
let t = term.value;
let s = session.value;

const q = query(collection(db,"results"),
where("studentID","==",id),
where("term","==",t),
where("session","==",s));

const snap = await getDocs(q);

if(snap.empty){
box.innerHTML="No result";
return;
}

const r = snap.docs[0].data();

/* STUDENT */
const sSnap = await getDocs(query(collection(db,"students"),
where("studentID","==",id)));

const st = sSnap.docs[0].data();

/* REAL SUBJECTS */
let rows="";

Object.entries(r.subjects).forEach(([sub,val])=>{

let grade =
val.total>=70?"A":
val.total>=60?"B":
val.total>=50?"C":"F";

rows += `
<tr>
<td>${sub}</td>
<td>${val.ca}</td>
<td>${val.exam}</td>
<td>${val.total}</td>
<td>${grade}</td>
</tr>`;
});

box.innerHTML = `
<div id="resultArea">

<div style="text-align:center">
<img src="logo.png" style="height:80px">
<h3>STAR ACADEMY RESULT</h3>
</div>

<b>Name:</b> ${st.name}<br>
<b>ID:</b> ${id}<br>
<b>Class:</b> ${st.level}<br>
<b>Dept:</b> ${st.department}<br>

<table>
<tr>
<th>Subject</th><th>CA</th><th>Exam</th><th>Total</th><th>Grade</th>
</tr>
${rows}
</table>

<br>

<b>Total:</b> ${r.total}<br>
<b>Average:</b> ${r.average.toFixed(2)}<br>
<b>Grade:</b> ${r.grade}<br>
<b>Status:</b> ${r.status}<br>

</div>

<button onclick="print()">Download PDF</button>
`;

};

</script>

</body>
</html>
