<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}

nav{
display:flex;
justify-content:space-between;
padding:10px;
}

.logo{height:90px}

.card{
max-width:850px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#00e5c0;
border:none;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #444;
padding:8px;
}

.back{color:#00e5c0}
</style>
</head>

<body>

<div class="overlay">

<nav>
<img src="logo.png" class="logo">
<div>
<a href="index.html" style="color:#00e5c0">Home</a>
<a href="admin.html" style="color:#00e5c0">Admin</a>
</div>
</nav>

<div class="card">

<h2>STUDENT RESULT CHECK</h2>

<input id="sid" placeholder="Student ID">

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session">

<button onclick="viewResult()">View Result</button>

<div id="box"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db = getFirestore(app);

window.viewResult = async function(){

const box = document.getElementById("box");

let id = sid.value.trim();
let termVal = term.value;
let sessionVal = session.value;

box.innerHTML="Loading...";

const q = query(collection(db,"results"),
where("studentID","==",id),
where("term","==",termVal),
where("session","==",sessionVal)
);

const snap = await getDocs(q);

if(snap.empty){
box.innerHTML="No result found";
return;
}

const r = snap.docs[0].data();

/* GET STUDENT */
const sSnap = await getDocs(query(collection(db,"students"),where("studentID","==",id)));

const student = sSnap.docs[0].data();

/* SUBJECT DISPLAY (REAL DATA) */
let rows="";

let subjects = r.subjects || {};

Object.values(subjects).forEach(sub=>{

let grade =
sub.total>=70?"A":
sub.total>=60?"B":
sub.total>=50?"C":"F";

rows += `
<tr>
<td>-</td>
<td>${sub.ca}</td>
<td>${sub.exam}</td>
<td>${sub.total}</td>
<td>${grade}</td>
</tr>`;
});

box.innerHTML = `
<div id="resultArea">

<div style="text-align:center">
<img src="logo.png" style="height:90px">
<h3>STAR ACADEMY RESULT</h3>
</div>

<b>Name:</b> ${student.name}<br>
<b>ID:</b> ${id}<br>
<b>Class:</b> ${student.level}<br>
<b>Dept:</b> ${student.department}<br>
<b>Term:</b> ${termVal}<br>
<b>Session:</b> ${sessionVal}<br>

<table>
<tr>
<th>Subject</th>
<th>CA</th>
<th>Exam</th>
<th>Total</th>
<th>Grade</th>
</tr>
${rows}
</table>

<br>

<b>Total:</b> ${r.total}<br>
<b>Average:</b> ${r.average.toFixed(2)}<br>
<b>Grade:</b> ${r.grade}<br>
<b>Status:</b> ${r.status}<br>

</div>

<button onclick="downloadPDF()">Download PDF</button>
`;

};

window.downloadPDF = function(){
let content=document.getElementById("resultArea").innerHTML;
let win=window.open("","", "width=900,height=700");
win.document.write(`<html><body>${content}</body></html>`);
win.print();
};

</script>

</body>
</html>
