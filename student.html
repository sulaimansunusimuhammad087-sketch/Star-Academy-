<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body { font-family: Arial; background:#0a0a0f; color:white; }
.center { max-width:500px; margin:auto; margin-top:50px; background:#16161f; padding:20px; border-radius:10px; }
input,button { width:100%; padding:10px; margin-top:10px; }
button { background:#00e5c0; border:none; font-weight:bold; }
.card { background:#111; padding:10px; margin-top:10px; border-radius:8px; }
h2{color:#00e5c0;}
</style>
</head>

<body>

<div class="center">

<h2>STUDENT LOGIN</h2>

<input id="studentID" placeholder="Enter Student ID">
<button onclick="login()">View Result</button>

<div id="result" class="card"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system",
storageBucket: "star-academy-system.firebasestorage.app",
messagingSenderId: "615097211278",
appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function(){

let id = studentID.value;

const q = query(collection(db,"students"), where("studentID","==",id));
const snap = await getDocs(q);

if(snap.empty){
result.innerHTML = "Student not found";
return;
}

snap.forEach(doc=>{

let data = doc.data();

result.innerHTML = `
<h3>${data.name}</h3>
<p>ID: ${data.studentID}</p>
<p>Department: ${data.department}</p>
<p>Level: ${data.level}</p>
`;
});

};

</script>

</body>
</html>
