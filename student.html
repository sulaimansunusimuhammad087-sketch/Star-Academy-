<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body { font-family:Arial; background:#0a0a0f; color:white; text-align:center; }
.card { background:#16161f; padding:20px; max-width:600px; margin:auto; border-radius:10px; }
input,button { width:100%; padding:10px; margin-top:10px; }
button { background:#00e5c0; border:none; font-weight:bold; }
a{color:#00e5c0;}
</style>
</head>

<body>

<div class="card">

<h2>STUDENT PORTAL</h2>

<a href="index.html">← Back Home</a>

<input id="studentID" placeholder="Enter Student ID">
<button onclick="getResult()">View Result</button>

<div id="output"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.getResult = async function(){

let id = studentID.value.trim();

/* STEP 1: FIND RESULT NOT STUDENT */
const q = query(collection(db,"results"), where("studentID","==",id));
const snap = await getDocs(q);

/* FIXED: NO RESULT MESSAGE */
if(snap.empty){
output.innerHTML = "<h3 style='color:red'>No result found for this Student ID</h3>";
return;
}

/* SHOW RESULTS */
snap.forEach(doc=>{
let r = doc.data();

output.innerHTML = `
<h3>Result Found</h3>
<p>Student ID: ${r.studentID}</p>
<p>Total: ${r.total}</p>
<p>Average: ${r.average}</p>
<p>Grade: ${r.grade}</p>
<p>Status: ${r.status}</p>
<p>Term: ${r.term}</p>
<p>Session: ${r.session}</p>
`;
});

};

</script>

</body>
</html>
