<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

.logo{height:90px}

.card{
max-width:850px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#00e5c0;
border:none;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #444;
padding:8px;
}

.back{
color:#00e5c0;
cursor:pointer;
margin-bottom:10px;
display:inline-block;
}
</style>
</head>

<body>

<div class="overlay">

<nav>
<img src="logo.png" class="logo">
<div>
<a href="index.html" style="color:#00e5c0">Home</a>
<a href="admin.html" style="color:#00e5c0">Admin</a>
</div>
</nav>

<div class="card">

<div class="back" onclick="history.back()">← Back</div>

<h2>STUDENT RESULT CHECK</h2>

<input id="sid" placeholder="Student ID">

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="viewResult()">View Result</button>

<div id="box"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db = getFirestore(app);

/* VIEW RESULT */
window.viewResult = async function(){

const box = document.getElementById("box");

/* ✅ FIX: MOBILE SAFE ACCESS */
let id = document.getElementById("sid").value.trim();
let termVal = document.getElementById("term").value;
let sessionVal = document.getElementById("session").value;

if(!id || !termVal || !sessionVal){
alert("Fill all fields");
return;
}

box.innerHTML = "Loading...";

const q = query(
collection(db,"results"),
where("studentID","==",id),
where("term","==",termVal),
where("session","==",sessionVal)
);

const snap = await getDocs(q);

if(snap.empty){
box.innerHTML = "No result found ❌";
return;
}

const r = snap.docs[0].data();

/* GET STUDENT */
const sSnap = await getDocs(
query(collection(db,"students"), where("studentID","==",id))
);

if(sSnap.empty){
box.innerHTML = "Student not found ❌";
return;
}

const student = sSnap.docs[0].data();

/* SUBJECTS */
const subjectsData = r.subjects || {};
const subjects = Object.keys(subjectsData);

let rows = "";

subjects.forEach(sub => {

let ca = subjectsData[sub]?.ca ?? 0;
let exam = subjectsData[sub]?.exam ?? 0;
let total = subjectsData[sub]?.total ?? (ca + exam);

let grade =
total>=70?"A":
total>=60?"B":
total>=50?"C":"F";

rows += `
<tr>
<td>${sub}</td>
<td>${ca}</td>
<td>${exam}</td>
<td>${total}</td>
<td>${grade}</td>
</tr>
`;

});

if(subjects.length === 0){
rows = `<tr><td colspan="5">No subject data available</td></tr>`;
}

box.innerHTML = `
<div id="resultArea">

<div style="text-align:center">
<img src="logo.png" style="height:90px">
<h3>STAR ACADEMY RESULT</h3>
</div>

<b>Name:</b> ${student.name}<br>
<b>ID:</b> ${id}<br>
<b>Class:</b> ${student.level}<br>
<b>Dept:</b> ${student.department}<br>
<b>Term:</b> ${termVal}<br>
<b>Session:</b> ${sessionVal}<br>

<table>
<tr>
<th>Subject</th>
<th>CA</th>
<th>Exam</th>
<th>Total</th>
<th>Grade</th>
</tr>
${rows}
</table>

<br>

<b>Total:</b> ${r.total}<br>
<b>Average:</b> ${r.average.toFixed(2)}<br>
<b>Grade:</b> ${r.grade}<br>
<b>Status:</b> ${r.status}<br>

<br>

<b>Feedback:</b><br>
${r.average>=70
? "Excellent performance"
: r.average>=50
? "Good effort"
: "Needs improvement"}

<br><br>

_____________________<br>
Director Signature

<br><br>

_____________________<br>
Exam Officer

</div>

<button onclick="downloadPDF()">Download PDF</button>
`;

};

/* PDF */
window.downloadPDF = function(){

const content = document.getElementById("resultArea").innerHTML;

const win = window.open("", "", "width=900,height=700");

win.document.write(`
<html>
<head>
<style>
body{font-family:Arial;padding:20px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid black;padding:8px;}
</style>
</head>
<body>
${content}
</body>
</html>
`);

win.document.close();
win.print();
};

</script>

</body>
</html>
