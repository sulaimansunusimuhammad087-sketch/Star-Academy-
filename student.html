<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-bottom:50px;
}

nav{
background:#16161f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
height:90px;
border-radius:12px;
}

nav a{
color:#00e5c0;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.card{
max-width:900px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
}

button{
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #444;
padding:8px;
}

.back{
color:#00e5c0;
cursor:pointer;
margin-bottom:10px;
display:inline-block;
}
</style>
</head>

<body>

<div class="overlay">

<nav>
<img src="logo.png" class="logo">
<div>
<a href="index.html">Home</a>
<a href="admin.html">Admin</a>
</div>
</nav>

<div class="card">

<div class="back" onclick="window.history.back()">← Back</div>

<h2>STUDENT RESULT CHECK</h2>

<input id="sid" placeholder="Student ID">

<select id="term">
<option value="">Select Term</option>
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="viewResult()">View Result</button>

<div id="box"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db = getFirestore(app);

window.viewResult = async function(){

const box = document.getElementById("box");

let id = sid.value.trim();
let termVal = term.value;
let sessionVal = session.value;

if(!id || !termVal || !sessionVal){
alert("Fill all fields ❗");
return;
}

box.innerHTML = "Loading...";

/* GET RESULTS */
let snap = await getDocs(collection(db,"results"));

let found = null;

snap.forEach(doc=>{
let r = doc.data();

if(r.studentID===id && r.term===termVal && r.session===sessionVal){
found = r;
}
});

if(!found){
box.innerHTML = "No result found ❌";
return;
}

/* GET STUDENT */
let studentSnap = await getDocs(collection(db,"students"));

let student = null;

studentSnap.forEach(doc=>{
let s = doc.data();
if(s.studentID === id){
student = s;
}
});

if(!student){
box.innerHTML = "Student not found ❌";
return;
}

/* SUBJECT TABLE */
let subjectsHTML = "";

if(found.subjects){

Object.entries(found.subjects).forEach(([sub,val])=>{

let ca = val.ca ?? "-";
let exam = val.exam ?? "-";
let total = val.total ?? (Number(val.ca||0)+Number(val.exam||0));

let grade =
total>=70?"A":
total>=60?"B":
total>=50?"C":"F";

subjectsHTML += `
<tr>
<td>${sub}</td>
<td>${ca}</td>
<td>${exam}</td>
<td>${total}</td>
<td>${grade}</td>
</tr>
`;

});

}else{
subjectsHTML = `<tr><td colspan="5">No subject data available</td></tr>`;
}

/* DISPLAY */
box.innerHTML = `
<div id="resultArea">

<div style="text-align:center">
<img src="logo.png" style="height:80px"><br>
<h3>STAR ACADEMY RESULT</h3>
</div>

<b>Name:</b> ${student.name}<br>
<b>Student ID:</b> ${id}<br>
<b>Class:</b> ${student.level}<br>
<b>Department:</b> ${student.department}<br>
<b>Term:</b> ${termVal}<br>
<b>Session:</b> ${sessionVal}<br>

<table>
<tr>
<th>Subject</th>
<th>CA</th>
<th>Exam</th>
<th>Total</th>
<th>Grade</th>
</tr>
${subjectsHTML}
</table>

<br>

<b>Total Score:</b> ${found.total}<br>
<b>Average:</b> ${found.average.toFixed(2)}<br>
<b>Grade:</b> ${found.grade}<br>
<b>Status:</b> ${found.status}<br>

<br>

<b>School Feedback:</b><br>
${found.average>=70?"Excellent performance. Keep it up.":
found.average>=50?"Good effort. Improve more.":
"Needs serious improvement."}

<br><br>

_________________________<br>
Director Signature

<br><br>

_________________________<br>
Examination Officer

</div>

<button onclick="downloadPDF()">Download PDF</button>
`;
};

/* PDF */
window.downloadPDF = function(){

let content = document.getElementById("resultArea").innerHTML;

let win = window.open("", "", "width=800,height=600");

win.document.write(`
<html>
<head>
<title>Result</title>
<style>
body{font-family:Arial;padding:20px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid black;padding:8px;}
h3{text-align:center;}
</style>
</head>
<body>
${content}
</body>
</html>
`);

win.document.close();
win.print();
};

</script>

</body>
</html>
