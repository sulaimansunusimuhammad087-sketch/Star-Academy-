<!DOCTYPE html>
<html>
<head>
<title>Star Academy System</title>

<style>
body { font-family: Arial; background:#0a0a0f; color:white; }
.center { max-width:550px; margin:auto; margin-top:50px; background:#16161f; padding:20px; }
input,select,button { width:100%; padding:10px; margin-top:10px; }
button { background:#00e5c0; border:none; cursor:pointer; }
.card { background:#111; padding:10px; margin-top:10px; }
.hidden{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<h2>Admin Login</h2>
<input id="email" placeholder="Enter Email">
<input id="password" type="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="center">

<h3>Add Student</h3>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">
<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">

<select id="department">
<option value="">Select Department</option>
<option>Science</option>
<option>Arts</option>
</select>

<select id="level">
<option value="">Select Level</option>
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option value="">School Type</option>
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option value="">Graduated?</option>
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>

<hr>

<h3>Add Result</h3>

<input id="studentIDInput" placeholder="Enter Student ID">

<select id="resDepartment" onchange="loadSubjects()">
<option>Science</option>
<option>Arts</option>
</select>

<div id="subjects"></div>

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="addResult()">Save Result</button>

<hr>

<h3>Students</h3>
<div id="students"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db=getFirestore(app);
const auth=getAuth(app);

/* LOGIN */
window.login = async function(){
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
loginPage.style.display="none";
dashboard.classList.remove("hidden");
}catch(err){
alert(err.message);
}
};

/* ID GENERATOR */
async function generateID(dept){
const ref=doc(db,"meta","counter");

const num=await runTransaction(db,async(tx)=>{
const snap=await tx.get(ref);
let count=snap.exists()?snap.data().count+1:1;
tx.set(ref,{count});
return count;
});

let short=dept==="Science"?"SCI":"ART";
return `STA/2026/${short}/${String(num).padStart(4,"0")}`;
}

/* ADD STUDENT */
window.addStudent = async function(){

if(
!name.value ||
!age.value ||
!department.value ||
!level.value ||
!schoolType.value ||
!schoolName.value ||
!graduated.value
){
alert("Please fill all required fields");
return;
}

const id = await generateID(department.value);

await addDoc(collection(db,"students"),{
studentID:id,
name:name.value,
age:age.value,
state:state.value,
lga:lga.value,
department:department.value,
level:level.value,
schoolType:schoolType.value,
schoolName:schoolName.value,
graduated:graduated.value,
createdAt:Date.now()
});

alert("Saved: "+id);
};

/* SUBJECTS */
function loadSubjects(){
let dept=resDepartment.value;

let list = dept==="Science" ?
["English","Biology","Chemistry","Physics","Mathematics"] :
["English","Literature","Government","Economics","Islamic Studies"];

subjects.innerHTML="";

list.forEach(sub=>{
subjects.innerHTML += `
<label>${sub}</label>
<input class="score" data-sub="${sub}" type="number" placeholder="Enter ${sub} score">
`;
});
}
loadSubjects();

/* ADD RESULT */
window.addResult = async function(){

if(!studentIDInput.value || !session.value){
alert("Fill Student ID and Session");
return;
}

let inputs=document.querySelectorAll(".score");
let scores={};
let total=0;

for(let i of inputs){
let val=Number(i.value);
if(isNaN(val)){
alert("Enter all marks");
return;
}
scores[i.dataset.sub]=val;
total+=val;
}

let avg=total/5;
let status=total>=250?"PASS":"FAIL";

let grade="F";
if(avg>=70)grade="A";
else if(avg>=60)grade="B";
else if(avg>=50)grade="C";
else if(avg>=45)grade="D";

await addDoc(collection(db,"results"),{
studentID:studentIDInput.value,
department:resDepartment.value,
scores,
total,
average:avg,
status,
grade,
term:term.value,
session:session.value,
createdAt:Date.now()
});

alert("Result Saved");
};

/* SHOW STUDENTS */
onSnapshot(collection(db,"students"),snap=>{
let arr=[];
snap.forEach(d=>arr.push(d.data()));
arr.sort((a,b)=>b.createdAt-a.createdAt);

students.innerHTML="";

arr.forEach(s=>{
students.innerHTML+=`
<div class="card">
<b>${s.studentID}</b><br>
Full Name: ${s.name}<br>
Age: ${s.age}<br>
Department: ${s.department}<br>
Level: ${s.level}<br>
School: ${s.schoolName} (${s.schoolType})<br>
Graduated: ${s.graduated}
</div>`;
});
});

</script>

</body>
</html>
