<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Academy System</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0f;
  color: white;
}

header {
  background: #111;
  padding: 20px;
  text-align: center;
  color: #00e5c0;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 12px;
  background: #00e5c0;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  font-weight: bold;
}

.card {
  background: #16161f;
  padding: 15px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
STAR ACADEMY STUDENT SYSTEM
</header>

<div class="container">

<h3>Add Student</h3>

<input id="name" placeholder="Student Name">
<input id="age" type="number" placeholder="Age">
<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">
<input id="quarter" placeholder="Quarter">

<select id="schoolType">
  <option>Private</option>
  <option>Public</option>
</select>

<button onclick="addStudent()">Save Student</button>

<h3>Students List</h3>
<div id="students"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
  authDomain: "star-academy-system.firebaseapp.com",
  projectId: "star-academy-system",
  storageBucket: "star-academy-system.appspot.com",
  messagingSenderId: "615097211278",
  appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 AUTO ID SYSTEM (0001, 0002, 0003...) */
async function generateStudentID() {
  const counterRef = doc(db, "meta", "counter");
  const counterSnap = await getDoc(counterRef);

  let count = 1;

  if (counterSnap.exists()) {
    count = counterSnap.data().count + 1;
  }

  await setDoc(counterRef, { count });

  return "STA/2026/" + String(count).padStart(4, "0");
}

/* ➕ ADD STUDENT */
window.addStudent = async function () {

  const studentID = await generateStudentID();

  await addDoc(collection(db, "students"), {
    studentID,
    name: document.getElementById("name").value || "Not provided",
    age: document.getElementById("age").value || "0",
    state: document.getElementById("state").value || "Not provided",
    lga: document.getElementById("lga").value || "Not provided",
    quarter: document.getElementById("quarter").value || "Not provided",
    schoolType: document.getElementById("schoolType").value || "Not provided",
    createdAt: new Date()
  });

  alert("Student Saved: " + studentID);
};

/* 📊 LIVE DISPLAY */
const studentsDiv = document.getElementById("students");

onSnapshot(collection(db, "students"), (snapshot) => {
  studentsDiv.innerHTML = "";

  snapshot.forEach((doc) => {
    const s = doc.data();

    studentsDiv.innerHTML += `
      <div class="card">
        <b>${s.studentID}</b><br>
        ${s.name} | ${s.age} years<br>
        ${s.state}, ${s.lga}, ${s.quarter}<br>
        ${s.schoolType}
      </div>
    `;
  });
});

</script>

</body>
</html>
