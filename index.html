<!DOCTYPE html>
<html>
<head>
<title>Star Academy Home</title>

<style>
body { font-family: Arial; background:#0a0a0f; color:white; text-align:center; }
nav { background:#16161f; padding:15px; }
a { color:#00e5c0; margin:10px; text-decoration:none; font-weight:bold; }
.card { background:#16161f; margin:20px auto; padding:20px; max-width:600px; border-radius:10px; }
button{padding:10px;background:#00e5c0;border:none;margin-top:10px;cursor:pointer;}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="admin.html">Admin</a>
<a href="student.html">Student</a>
</nav>

<h1>STAR ACADEMY SYSTEM</h1>

<div class="card">
<h2>About School</h2>
<p>Star Academy trains students for university success in Science and Arts fields.</p>
</div>

<div class="card">
<h2>Live Statistics</h2>
<div id="stats">Loading...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let totalStudents = 0;

onSnapshot(collection(db,"students"),snap=>{
totalStudents = snap.size;
update();
});

function update(){
stats.innerHTML = `
<b>Total Students:</b> ${totalStudents}
`;
}

</script>

</body>
</html>
