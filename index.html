<!DOCTYPE html>
<html>
<head>
<title>Star Academy System</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0a0a0f;
  color: white;
}

.center {
  max-width: 550px;
  margin: auto;
  margin-top: 50px;
  padding: 20px;
  background: #16161f;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #00e5c0;
  border: none;
  cursor: pointer;
}

.hidden { display: none; }

.card {
  background: #111;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">

  <div style="position:relative">
    <input id="password" type="password" placeholder="Password">
    <span onclick="togglePassword()" style="position:absolute;right:10px;top:10px;cursor:pointer">👁</span>
  </div>

  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="center">

<h3>Add Student</h3>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">
<input id="state" placeholder="State">
<input id="lga" placeholder="LGA">

<select id="level">
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option value="">Graduated?</option>
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>

<h3>Add Result</h3>

<input id="studentIDInput" placeholder="Student ID">

<input id="sub1" type="number" placeholder="Subject 1">
<input id="sub2" type="number" placeholder="Subject 2">
<input id="sub3" type="number" placeholder="Subject 3">
<input id="sub4" type="number" placeholder="Subject 4">
<input id="sub5" type="number" placeholder="Subject 5">

<button onclick="addResult()">Save Result</button>

<h3>Students</h3>
<div id="students"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
  authDomain: "star-academy-system.firebaseapp.com",
  projectId: "star-academy-system",
  storageBucket: "star-academy-system.appspot.com",
  messagingSenderId: "615097211278",
  appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async function () {
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    loginPage.style.display = "none";
    dashboard.classList.remove("hidden");

  } catch (err) {
    alert(err.message);
  }
};

/* PASSWORD */
window.togglePassword = function () {
  password.type = password.type === "password" ? "text" : "password";
};

/* ID SYSTEM */
async function generateID() {
  const ref = doc(db, "meta", "counter");

  const num = await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    let count = snap.exists() ? snap.data().count + 1 : 1;
    tx.set(ref, { count });
    return count;
  });

  return "STA/2026/" + String(num).padStart(4, "0");
}

/* ADD STUDENT */
window.addStudent = async function () {

  if (!name.value || !age.value || !schoolName.value || !graduated.value) {
    alert("Fill all required fields");
    return;
  }

  const id = await generateID();

  await addDoc(collection(db, "students"), {
    studentID: id,
    name: name.value,
    age: age.value,
    state: state.value,
    lga: lga.value,
    level: level.value,
    schoolType: schoolType.value,
    schoolName: schoolName.value,
    graduated: graduated.value,
    createdAt: new Date().getTime()
  });

  alert("Saved: " + id);
};

/* ADD RESULT */
window.addResult = async function () {

  let scores = [
    +sub1.value, +sub2.value, +sub3.value, +sub4.value, +sub5.value
  ];

  if (scores.some(s => isNaN(s))) {
    alert("Enter all scores");
    return;
  }

  let total = scores.reduce((a,b)=>a+b,0);
  let avg = total / 5;
  let status = total >= 250 ? "PASS" : "FAIL";

  await addDoc(collection(db, "results"), {
    studentID: studentIDInput.value,
    scores,
    total,
    average: avg,
    status,
    createdAt: new Date().getTime()
  });

  alert("Result Saved");
};

/* SHOW STUDENTS */
const div = document.getElementById("students");

onSnapshot(collection(db, "students"), snap => {

  let arr = [];
  snap.forEach(doc => arr.push(doc.data()));

  arr.sort((a,b)=>b.createdAt - a.createdAt);

  div.innerHTML = "";

  arr.forEach(s => {
    div.innerHTML += `
    <div class="card">
      <b>${s.studentID}</b><br>
      Full Name: ${s.name}<br>
      Age: ${s.age}<br>
      Level: ${s.level}<br>
      School: ${s.schoolName} (${s.schoolType})<br>
      Graduated: ${s.graduated}
    </div>
    `;
  });

});

</script>

</body>
</html>
