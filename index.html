<!DOCTYPE html>
<html>
<head>
<title>Star Academy System</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0a0a0f;
  color: white;
}

.center {
  max-width: 400px;
  margin: auto;
  margin-top: 100px;
  padding: 20px;
  background: #16161f;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #00e5c0;
  border: none;
  cursor: pointer;
}

.hidden { display: none; }

header {
  text-align: center;
  padding: 15px;
  background: #111;
  color: #00e5c0;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="center">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<header>STAR ACADEMY SYSTEM</header>

<div class="center">

<h3>Add Student</h3>

<input id="name" placeholder="Student Name">
<input id="age" type="number" placeholder="Age">
<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">

<select id="level">
  <option>Primary</option>
  <option>Junior Secondary</option>
  <option>Fresh Class</option>
  <option>Level 1</option>
  <option>Level 2</option>
  <option>Level 3</option>
</select>

<select id="schoolType">
  <option>Private</option>
  <option>Public</option>
</select>

<button onclick="addStudent()">Save Student</button>

<h3>Students</h3>
<div id="students"></div>

</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
doc,
getDoc,
setDoc,
runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system",
storageBucket: "star-academy-system.appspot.com",
messagingSenderId: "615097211278",
appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async function () {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try {
await signInWithEmailAndPassword(auth, email, password);

document.getElementById("loginPage").style.display = "none";
document.getElementById("dashboard").classList.remove("hidden");

} catch (err) {
alert(err.message);
}
};

/* ID SYSTEM */
async function generateStudentID() {
const ref = doc(db, "meta", "counter");

const newNumber = await runTransaction(db, async (tx) => {
const snap = await tx.get(ref);
let count = snap.exists() ? snap.data().count + 1 : 1;
tx.set(ref, { count });
return count;
});

return "STA/2026/" + String(newNumber).padStart(4, "0");
}

/* ADD STUDENT */
window.addStudent = async function () {

const studentID = await generateStudentID();

await addDoc(collection(db, "students"), {
studentID,
name: document.getElementById("name").value || "N/A",
age: document.getElementById("age").value || "0",
state: document.getElementById("state").value || "N/A",
lga: document.getElementById("lga").value || "N/A",
level: document.getElementById("level").value,
schoolType: document.getElementById("schoolType").value,
createdAt: new Date().toISOString()
});

alert("Saved: " + studentID);
};

/* SHOW DATA */
const div = document.getElementById("students");

onSnapshot(collection(db, "students"), (snap) => {
div.innerHTML = "";

snap.forEach(doc => {
let s = doc.data();

div.innerHTML += `
<div style="background:#111;padding:10px;margin-top:10px">
<b>${s.studentID}</b><br>
${s.name} | ${s.age}<br>
${s.level}<br>
${s.state}, ${s.lga}<br>
${s.createdAt}
</div>
`;
});
});

</script>

</body>
</html>
