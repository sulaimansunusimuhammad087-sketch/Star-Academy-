<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
  authDomain: "star-academy-system.firebaseapp.com",
  projectId: "star-academy-system",
  storageBucket: "star-academy-system.appspot.com",
  messagingSenderId: "615097211278",
  appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// FIXED ID SYSTEM (no count errors)
function generateID() {
  return "STA/2026/" + Math.floor(1000 + Math.random() * 9000);
}

window.addStudent = async function () {
  try {
    const studentID = generateID();

    await addDoc(collection(db, "students"), {
      studentID,
      name: document.getElementById("name").value,
      age: document.getElementById("age").value,
      state: document.getElementById("state").value,
      lga: document.getElementById("lga").value,
      quarter: document.getElementById("quarter").value,
      schoolType: document.getElementById("schoolType").value,
      createdAt: new Date()
    });

    alert("Student Saved Successfully: " + studentID);

  } catch (error) {
    console.log(error);
    alert("Error: " + error.message);
  }
};

// LIVE DISPLAY
const studentsDiv = document.getElementById("students");

onSnapshot(collection(db, "students"), (snapshot) => {
  studentsDiv.innerHTML = "";

  snapshot.forEach((doc) => {
    const s = doc.data();

    studentsDiv.innerHTML += `
      <div class="card">
        <b>${s.studentID}</b><br>
        ${s.name} | ${s.age} years<br>
        ${s.state}, ${s.lga}, ${s.quarter}<br>
        ${s.schoolType}
      </div>
    `;
  });
});
</script>
