<!DOCTYPE html>
<html>
<head>
<title>Star Academy System</title>

<style>
body { font-family: Arial; background:#0a0a0f; color:white; }
.center { max-width:650px; margin:auto; margin-top:40px; background:#16161f; padding:20px; border-radius:10px; }
input,select,button { width:100%; padding:10px; margin-top:10px; border-radius:5px; }
button { background:#00e5c0; border:none; cursor:pointer; font-weight:bold; }
.card { background:#111; padding:10px; margin-top:10px; border-radius:8px; }
.hidden{display:none;}
hr{margin:20px 0;}
h2,h3{color:#00e5c0;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<h2>STAR ACADEMY LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="center">

<h2>ADMIN DASHBOARD</h2>

<!-- ADD STUDENT -->
<h3>Add Student</h3>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">
<input id="state" placeholder="State">
<input id="lga" placeholder="LGA">

<select id="department">
<option value="">Department</option>
<option>Science</option>
<option>Arts</option>
</select>

<select id="level">
<option value="">Level</option>
<option>Fresh Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option>No</option>
<option>Yes</option>
</select>

<button onclick="addStudent()">Save Student</button>

<hr>

<!-- ADD RESULT -->
<h3>Add Result</h3>

<input id="studentIDInput" placeholder="Student ID" oninput="detectDepartment()">

<div id="subjects"></div>

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="addResult()">Save Result</button>

<hr>

<!-- ANALYTICS -->
<h3>Analytics</h3>
<div id="analytics" class="card"></div>

<hr>

<!-- STUDENTS LIST -->
<h3>Students</h3>
<div id="students"></div>

<hr>

<!-- RESULTS -->
<h3>Results</h3>
<div id="results"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
doc,
runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async function(){
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
loginPage.style.display="none";
dashboard.classList.remove("hidden");
loadAnalytics();
}catch(e){
alert(e.message);
}
};

/* ID GENERATOR */
async function generateID(dept){
const ref = doc(db,"meta","counter");

const num = await runTransaction(db,async(tx)=>{
const snap = await tx.get(ref);
let count = snap.exists()?snap.data().count+1:1;
tx.set(ref,{count});
return count;
});

let code = dept==="Science"?"SCI":"ART";
return `STA/2026/${code}/${String(num).padStart(4,"0")}`;
}

/* ADD STUDENT */
window.addStudent = async function(){

let s = {
name:name.value,
age:age.value,
state:state.value,
lga:lga.value,
department:department.value,
level:level.value,
schoolType:schoolType.value,
schoolName:schoolName.value,
graduated:graduated.value
};

if(Object.values(s).some(v=>!v)){
alert("Fill all fields");
return;
}

let id = await generateID(s.department);

await addDoc(collection(db,"students"),{
studentID:id,
...s,
createdAt:Date.now()
});

alert("Student Added: " + id);
};

/* SUBJECT LOADING */
window.detectDepartment = function(){

let id = studentIDInput.value;

let subjectsList = id.includes("SCI")
? ["English","Biology","Chemistry","Physics","Mathematics"]
: ["English","Literature","Government","Economics","Islamic Studies"];

subjects.innerHTML="";

subjectsList.forEach(sub=>{
subjects.innerHTML += `
<label>${sub}</label>
<input class="score" type="number" placeholder="Score">
`;
});
};

/* ADD RESULT */
window.addResult = async function(){

let id = studentIDInput.value;
let sessionVal = session.value;
let termVal = term.value;

if(!id || !sessionVal){
alert("Fill required fields");
return;
}

let scores = document.querySelectorAll(".score");
let total = 0;

scores.forEach(s=>{
total += Number(s.value);
});

let avg = total / scores.length;
let status = total >= 250 ? "PASS" : "FAIL";

let grade = "F";
if(avg>=70)grade="A";
else if(avg>=60)grade="B";
else if(avg>=50)grade="C";
else if(avg>=45)grade="D";

await addDoc(collection(db,"results"),{
studentID:id,
total,
average:avg,
status,
grade,
term:termVal,
session:sessionVal,
createdAt:Date.now()
});

alert("Result Saved");
loadAnalytics();
};

/* ANALYTICS */
function loadAnalytics(){

onSnapshot(collection(db,"results"),snap=>{

let total=0,pass=0,fail=0;

snap.forEach(d=>{
let r=d.data();
total++;
if(r.status==="PASS") pass++;
else fail++;
});

analytics.innerHTML=`
Total Results: ${total}<br>
Pass: ${pass}<br>
Fail: ${fail}<br>
Pass Rate: ${total?((pass/total)*100).toFixed(2):0}%
`;
});
}

/* STUDENTS */
onSnapshot(collection(db,"students"),snap=>{

students.innerHTML="";

snap.forEach(d=>{
let s=d.data();
students.innerHTML += `
<div class="card">
<b>${s.studentID}</b><br>
${s.name}<br>
${s.department} - ${s.level}
</div>`;
});
});

/* RESULTS */
onSnapshot(collection(db,"results"),snap=>{

results.innerHTML="";

snap.forEach(d=>{
let r=d.data();
results.innerHTML += `
<div class="card">
<b>${r.studentID}</b><br>
Total: ${r.total}<br>
Grade: ${r.grade}<br>
Status: ${r.status}
</div>`;
});
});

</script>

</body>
</html>
