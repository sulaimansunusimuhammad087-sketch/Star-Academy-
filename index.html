<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Academy System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
  color: white;
}

header {
  background: #111;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  color: #00e5c0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #00e5c0;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.card {
  background: #16161f;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
STAR ACADEMY STUDENT SYSTEM
</header>

<div class="container">

<h3>Add Student</h3>

<input id="name" placeholder="Student Name">
<input id="age" type="number" placeholder="Age">
<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">
<input id="quarter" placeholder="Quarter">

<select id="schoolType">
  <option>Private</option>
  <option>Public</option>
</select>

<button onclick="addStudent()">Save Student</button>

<h3>Students List</h3>
<div id="students"></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
  authDomain: "star-academy-system.firebaseapp.com",
  projectId: "star-academy-system",
  storageBucket: "star-academy-system.appspot.com",
  messagingSenderId: "615097211278",
  appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// student counter
let count = 0;

window.addStudent = async function () {
  count++;

  const studentID = "STA/2026/" + String(count).padStart(3, "0");

  await addDoc(collection(db, "students"), {
    studentID,
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    state: document.getElementById("state").value,
    lga: document.getElementById("lga").value,
    quarter: document.getElementById("quarter").value,
    schoolType: document.getElementById("schoolType").value,
    createdAt: new Date()
  });

  alert("Student Saved: " + studentID);
};

// live display
const studentsDiv = document.getElementById("students");

onSnapshot(collection(db, "students"), (snapshot) => {
  studentsDiv.innerHTML = "";

  snapshot.forEach((doc) => {
    const s = doc.data();

    studentsDiv.innerHTML += `
      <div class="card">
        <b>${s.studentID}</b><br>
        ${s.name} | ${s.age} years<br>
        ${s.state}, ${s.lga}, ${s.quarter}<br>
        ${s.schoolType}
      </div>
    `;
  });
});
</script>

</body>
</html>
