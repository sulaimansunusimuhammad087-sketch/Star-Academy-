<!DOCTYPE html>
<html>
<head>
<title>Star Academy System</title>

<style>
body {font-family:Arial;margin:0;background:#0a0a0f;color:white;}
header {padding:20px;text-align:center;background:#111;color:#00e5c0;font-size:22px;}
.container{max-width:900px;margin:auto;padding:20px;}
input,select{width:100%;padding:10px;margin:5px 0;}
button{width:100%;padding:10px;background:#00e5c0;border:none;cursor:pointer;}
.card{background:#16161f;padding:10px;margin-top:10px;}
</style>
</head>

<body>

<header>STAR ACADEMY SYSTEM</header>

<div class="container">

<h3>Add Student</h3>

<input id="name" placeholder="Name">
<input id="age" type="number" placeholder="Age">
<input id="state" placeholder="State">
<input id="lga" placeholder="LGA">
<input id="quarter" placeholder="Quarter">

<select id="schoolType">
<option>Private</option>
<option>Public</option>
</select>

<button onclick="addStudent()">Save Student</button>

<h3>Students</h3>
<div id="students"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system",
storageBucket: "star-academy-system.appspot.com",
messagingSenderId: "615097211278",
appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function generateID(){
return "STA/2026/" + Math.floor(1000 + Math.random()*9000);
}

window.addStudent = async function(){

const studentID = generateID();

await addDoc(collection(db,"students"),{
studentID,
name:document.getElementById("name").value,
age:document.getElementById("age").value,
state:document.getElementById("state").value,
lga:document.getElementById("lga").value,
quarter:document.getElementById("quarter").value,
schoolType:document.getElementById("schoolType").value,
createdAt:new Date()
});

alert("Saved: " + studentID);
};

const studentsDiv=document.getElementById("students");

onSnapshot(collection(db,"students"),(snap)=>{
studentsDiv.innerHTML="";
snap.forEach(doc=>{
const s=doc.data();
studentsDiv.innerHTML+=`
<div class="card">
<b>${s.studentID}</b><br>
${s.name} | ${s.age}<br>
${s.state}, ${s.lga}
</div>`;
});
});
</script>

</body>
</html>
