<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-bottom:50px;
}

nav{
background:#16161f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
height:80px;
border-radius:12px;
}

nav a{
color:#00e5c0;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.card{
max-width:800px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

.hidden{display:none;}

.back{
color:#00e5c0;
cursor:pointer;
margin-bottom:10px;
display:inline-block;
}

.subject-box{
background:#111;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>
<div class="overlay">

<nav>
<img src="logo.png" class="logo">
<div>
<a href="index.html">Home</a>
<a href="student.html">Student</a>
</div>
</nav>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card" id="menu">
<h2>DASHBOARD</h2>
<button onclick="showSection('studentSection')">Student Registration</button>
<button onclick="showSection('resultSection')">Add Students Results</button>
<button onclick="showSection('deleteSection')">Delete Student</button>
</div>

<!-- STUDENT -->
<div id="studentSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Student Registration</h3>

<input id="name">
<input id="age" type="number">
<select id="gender"><option>Male</option><option>Female</option></select>
<input id="state">
<input id="lga">
<input id="address">
<input id="phone">
<input id="emailStudent">

<select id="department">
<option>Science</option>
<option>Arts</option>
</select>

<select id="level">
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName">
<select id="graduated">
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>
</div>

<!-- RESULT -->
<div id="resultSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Add Students Results</h3>

<input id="studentID" oninput="loadStudent()">
<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session">

<button onclick="saveResult()">Save Result</button>

<div id="resultPreview"></div>
</div>

<!-- DELETE -->
<div id="deleteSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Delete Student</h3>

<input id="deleteID">
<button onclick="deleteStudent()">Delete</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, runTransaction,
query, where, getDocs, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ✅ YOUR REAL FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system",
storageBucket: "star-academy-system.appspot.com",
messagingSenderId: "615097211278",
appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN FIX */
window.login = async () => {
try {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth, email, password);

document.getElementById("loginBox").style.display = "none";
document.getElementById("dashboard").classList.remove("hidden");

} catch (e) {
document.getElementById("msg").innerText = e.message;
}
};

/* NAV */
window.showSection = (id) => {
document.getElementById("menu").classList.add("hidden");
document.getElementById("studentSection").classList.add("hidden");
document.getElementById("resultSection").classList.add("hidden");
document.getElementById("deleteSection").classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
};

window.goHome = () => {
document.getElementById("menu").classList.remove("hidden");
document.getElementById("studentSection").classList.add("hidden");
document.getElementById("resultSection").classList.add("hidden");
document.getElementById("deleteSection").classList.add("hidden");
};

/* STUDENT ADD */
window.addStudent = async () => {
try {

const name = document.getElementById("name").value;
const dept = document.getElementById("department").value;
const phone = document.getElementById("phone").value;

if (!name || !dept || !phone) {
alert("Fill required fields");
return;
}

const ref = doc(db, "meta", dept === "Science" ? "scienceCounter" : "artsCounter");

const id = await runTransaction(db, async (tx) => {
const snap = await tx.get(ref);
const count = snap.exists() ? snap.data().count + 1 : 1;
tx.set(ref, { count });

return `STA/2026/${dept === "Science" ? "SCI" : "ART"}/${String(count).padStart(4, "0")}`;
});

await addDoc(collection(db, "students"), {
studentID: id,
name,
age: document.getElementById("age").value,
gender: document.getElementById("gender").value,
state: document.getElementById("state").value,
lga: document.getElementById("lga").value,
address: document.getElementById("address").value,
phone,
email: document.getElementById("emailStudent").value,
department: dept,
level: document.getElementById("level").value,
schoolType: document.getElementById("schoolType").value,
schoolName: document.getElementById("schoolName").value,
graduated: document.getElementById("graduated").value,
createdAt: Date.now()
});

alert("Student Added ✔ " + id);

} catch (e) {
alert(e.message);
console.error(e);
}
};

/* LOAD STUDENT */
window.loadStudent = async () => {
const id = document.getElementById("studentID").value;

const q = query(collection(db, "students"), where("studentID", "==", id));
const snap = await getDocs(q);

const box = document.getElementById("studentName");
const sub = document.getElementById("subjects");

if (snap.empty) {
box.innerHTML = "Not found";
sub.innerHTML = "";
return;
}

const s = snap.docs[0].data();

box.innerHTML = s.name;

sub.innerHTML = "";

const list = s.department === "Science"
? ["English", "Biology", "Chemistry", "Physics", "Mathematics"]
: ["English", "Literature", "Government", "Economics", "Islamic Studies"];

list.forEach(x => {
sub.innerHTML += `
<div class="subject-box">
<b>${x}</b>
<input class="ca">
<input class="exam">
</div>`;
});
};

/* SAVE RESULT */
window.saveResult = async () => {
alert("Result saved ✔");
};

/* DELETE */
window.deleteStudent = async () => {
const id = document.getElementById("deleteID").value;

const s = await getDocs(query(collection(db,"students"), where("studentID","==",id)));
s.forEach(d=>deleteDoc(d.ref));

const r = await getDocs(query(collection(db,"results"), where("studentID","==",id)));
r.forEach(d=>deleteDoc(d.ref));

alert("Deleted ✔");
};

</script>

</body>
</html>
