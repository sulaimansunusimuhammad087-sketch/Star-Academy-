<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-bottom:50px;
}

nav{
background:#16161f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
height:80px;
border-radius:12px;
}

nav a{
color:#00e5c0;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.card{
max-width:800px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

.hidden{display:none;}

.back{
color:#00e5c0;
cursor:pointer;
margin-bottom:10px;
display:inline-block;
}

.subject-box{
background:#111;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>
<div class="overlay">

<!-- NAV -->
<nav>
<img src="logo.png" class="logo">
<div>
<a href="index.html">Home</a>
<a href="student.html">Student</a>
</div>
</nav>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card" id="menu">
<h2>DASHBOARD</h2>
<button onclick="showSection('studentSection')">Student Registration</button>
<button onclick="showSection('resultSection')">Add Students Results</button>
<button onclick="showSection('deleteSection')">Delete Student</button>
</div>

<!-- STUDENT -->
<div id="studentSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Student Registration</h3>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone Number">
<input id="emailStudent" placeholder="Student Email">

<select id="department">
<option value="">Department</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
</select>

<select id="level">
<option value="">Level</option>
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>AI Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option value="">School Type</option>
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option value="">Graduated</option>
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>
</div>

<!-- RESULT -->
<div id="resultSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Add Students Results</h3>

<input id="studentID" placeholder="Enter Student ID" oninput="loadStudent()">

<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option value="">Term</option>
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="saveResult()">Save Result</button>

<div id="resultPreview"></div>
</div>

<!-- ✅ DELETE SECTION (NEW) -->
<div id="deleteSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Delete Student</h3>

<input id="deleteID" placeholder="Enter Student ID to delete">

<button onclick="deleteStudent()">Delete Student & Results</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, runTransaction,
query, where, getDocs, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async ()=>{
try{
await signInWithEmailAndPassword(
auth,
document.getElementById("email").value,
document.getElementById("password").value
);
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").classList.remove("hidden");
}catch(e){
document.getElementById("msg").innerText = e.message;
}
};

/* NAV */
window.showSection = id=>{
document.getElementById("menu").classList.add("hidden");
document.getElementById("studentSection").classList.add("hidden");
document.getElementById("resultSection").classList.add("hidden");
document.getElementById("deleteSection").classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
};

window.goHome = ()=>{
document.getElementById("menu").classList.remove("hidden");
document.getElementById("studentSection").classList.add("hidden");
document.getElementById("resultSection").classList.add("hidden");
document.getElementById("deleteSection").classList.add("hidden");
};

/* ADD STUDENT */
window.addStudent = async ()=>{

try{

let phoneVal = document.getElementById("phone").value.trim();
let emailVal = document.getElementById("emailStudent").value.trim();
let dept = document.getElementById("department").value;

let q1 = query(collection(db,"students"), where("phone","==",phoneVal));
let q2 = query(collection(db,"students"), where("email","==",emailVal));

if(!(await getDocs(q1)).empty || !(await getDocs(q2)).empty){
alert("Student already exists ❌");
return;
}

let ref = doc(
db,
"meta",
dept === "Science" ? "scienceCounter" : "artsCounter"
);

let id = await runTransaction(db, async (tx) => {
let snap = await tx.get(ref);
let count = snap.exists() ? snap.data().count + 1 : 1;
tx.set(ref, { count });
let prefix = dept === "Science" ? "SCI" : "ART";
return `STA/2026/${prefix}/${String(count).padStart(5, "0")}`;
});

await addDoc(collection(db,"students"),{
studentID:id,
name:document.getElementById("name").value,
age:document.getElementById("age").value,
gender:document.getElementById("gender").value,
state:document.getElementById("state").value,
lga:document.getElementById("lga").value,
address:document.getElementById("address").value,
phone:phoneVal,
email:emailVal,
department:dept,
level:document.getElementById("level").value,
schoolType:document.getElementById("schoolType").value,
schoolName:document.getElementById("schoolName").value,
graduated:document.getElementById("graduated").value,
createdAt:Date.now()
});

alert("Student Added ✔ " + id);

document.querySelectorAll("#studentSection input").forEach(i=>i.value="");
document.querySelectorAll("#studentSection select").forEach(s=>s.value="");

}catch(e){
alert("Error: " + e.message);
}
};

/* ✅ DELETE FUNCTION */
window.deleteStudent = async ()=>{

let id = document.getElementById("deleteID").value.trim();

if(!id){
alert("Enter Student ID ❌");
return;
}

if(!confirm("Are you sure you want to delete this student?")){
return;
}

/* DELETE STUDENT */
let sQuery = query(collection(db,"students"), where("studentID","==",id));
let sSnap = await getDocs(sQuery);

sSnap.forEach(async (docSnap)=>{
await deleteDoc(docSnap.ref);
});

/* DELETE RESULTS */
let rQuery = query(collection(db,"results"), where("studentID","==",id));
let rSnap = await getDocs(rQuery);

rSnap.forEach(async (docSnap)=>{
await deleteDoc(docSnap.ref);
});

alert("Student and results deleted ✔");

document.getElementById("deleteID").value="";

};

</script>

</body>
</html>
