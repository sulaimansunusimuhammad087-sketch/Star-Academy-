<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body { font-family:Arial; background:#0a0a0f; color:white; text-align:center; }
.card { background:#16161f; padding:20px; max-width:600px; margin:auto; border-radius:10px; }
input,button { width:100%; padding:10px; margin-top:10px; }
button { background:#00e5c0; border:none; font-weight:bold; }
.hidden{display:none;}
a{color:#00e5c0;}
</style>
</head>

<body>

<div id="login" class="card">
<h2>ADMIN LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="dash" class="hidden">

<div class="card">

<h2>ADMIN DASHBOARD</h2>

<a href="index.html">← Back Home</a>

<h3>Add Student</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<select id="dept">
<option>Science</option>
<option>Arts</option>
</select>

<button onclick="addStudent()">Save</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function(){
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
login.style.display="none";
dash.classList.remove("hidden");
}catch(e){
alert("Login failed");
}
};

/* ADD STUDENT */
window.addStudent = async function(){
await addDoc(collection(db,"students"),{
name:name.value,
age:age.value,
dept:dept.value,
createdAt:Date.now()
});
alert("Saved");
};

</script>

</body>
</html>
