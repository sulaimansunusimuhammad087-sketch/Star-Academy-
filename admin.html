<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-bottom:50px;
}

nav{
background:#16161f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
height:80px;
border-radius:12px;
}

nav a{
color:#00e5c0;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.card{
max-width:800px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

.hidden{display:none;}

.back{
color:#00e5c0;
cursor:pointer;
margin-bottom:10px;
display:inline-block;
}

.subject-box{
background:#111;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>
<div class="overlay">

<nav>
<img src="logo.png" class="logo">
<div>
<a href="index.html">Home</a>
<a href="student.html">Student</a>
</div>
</nav>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card" id="menu">
<h2>DASHBOARD</h2>
<button onclick="showSection('studentSection')">Student Registration</button>
<button onclick="showSection('resultSection')">Add Students Results</button>
</div>

<!-- STUDENT -->
<div id="studentSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Student Registration</h3>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone Number">
<input id="emailStudent" placeholder="Student Email">

<select id="department">
<option value="">Department</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
</select>

<select id="level">
<option value="">Level</option>
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>AI Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option value="">School Type</option>
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option value="">Graduated</option>
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>
</div>

<!-- RESULT -->
<div id="resultSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Add Students Results</h3>

<input id="studentID" placeholder="Enter Student ID" oninput="loadStudent()">

<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option value="">Term</option>
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="saveResult()">Save Result</button>

<div id="resultPreview"></div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, runTransaction,
query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async () => {
try {
await signInWithEmailAndPassword(
auth,
document.getElementById("email").value,
document.getElementById("password").value
);

loginBox.style.display = "none";
dashboard.classList.remove("hidden");

} catch (e) {
msg.innerText = e.message;
}
};

/* NAV */
window.showSection = id => {
menu.classList.add("hidden");
studentSection.classList.add("hidden");
resultSection.classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
};

window.goHome = () => {
menu.classList.remove("hidden");
studentSection.classList.add("hidden");
resultSection.classList.add("hidden");
};

/* ADD STUDENT (WITH DUPLICATE BLOCK) */
window.addStudent = async () => {
try {

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let email = document.getElementById("emailStudent").value.trim();
let dept = document.getElementById("department").value;

if (!name || !phone || !dept) {
alert("Fill required fields");
return;
}

/* BLOCK DUPLICATES */
let q1 = query(collection(db,"students"), where("phone","==",phone));
let q2 = query(collection(db,"students"), where("email","==",email));

if (!(await getDocs(q1)).empty || !(await getDocs(q2)).empty) {
alert("Student already exists (phone/email duplicate)");
return;
}

/* COUNTER */
let ref = doc(db,"meta", dept==="Science"?"scienceCounter":"artsCounter");

let id = await runTransaction(db, async (tx) => {
let snap = await tx.get(ref);
let count = snap.exists()?snap.data().count+1:1;
tx.set(ref,{count});

return `STA/2026/${dept==="Science"?"SCI":"ART"}/${String(count).padStart(5,"0")}`;
});

/* SAVE */
await addDoc(collection(db,"students"), {
studentID:id,
name,
age:document.getElementById("age").value,
gender:document.getElementById("gender").value,
state:document.getElementById("state").value,
lga:document.getElementById("lga").value,
address:document.getElementById("address").value,
phone,
email,
department:dept,
level:document.getElementById("level").value,
schoolType:document.getElementById("schoolType").value,
schoolName:document.getElementById("schoolName").value,
graduated:document.getElementById("graduated").value,
createdAt:Date.now()
});

alert("Student Added ✔ " + id);

/* CLEAR */
document.querySelectorAll("#studentSection input").forEach(i=>i.value="");
document.querySelectorAll("#studentSection select").forEach(s=>s.value="");

} catch (e) {
alert(e.message);
}
};

/* LOAD STUDENT */
window.loadStudent = async () => {

let id = document.getElementById("studentID").value.trim();

let box = document.getElementById("studentName");
let sub = document.getElementById("subjects");

if (!id) return;

let q = query(collection(db,"students"), where("studentID","==",id));
let snap = await getDocs(q);

if (snap.empty) {
box.innerHTML = "Not found";
sub.innerHTML = "";
return;
}

let s = snap.docs[0].data();

box.innerHTML = `<b>${s.name}</b> | ${s.department}`;

let list = s.department==="Science"
? ["English","Biology","Chemistry","Physics","Mathematics"]
: ["English","Literature","Government","Economics","Islamic Studies"];

sub.innerHTML = "";

list.forEach(x=>{
sub.innerHTML += `
<div class="subject-box">
<b>${x}</b><br>
CA <input class="ca" type="number" placeholder="0-40">
Exam <input class="exam" type="number" placeholder="0-60">
</div>`;
});
};

/* SAVE RESULT (WITH FULL BLOCK SYSTEM) */
window.saveResult = async () => {

let id = document.getElementById("studentID").value;
let t = document.getElementById("term").value;
let s = document.getElementById("session").value;

/* BLOCK DUPLICATE RESULT */
let q = query(collection(db,"results"),
where("studentID","==",id),
where("term","==",t),
where("session","==",s)
);

if (!(await getDocs(q)).empty) {
alert("Result already exists for this term/session");
return;
}

let boxes = document.querySelectorAll(".subject-box");
let data = {};
let total = 0;

boxes.forEach(b=>{
let name = b.querySelector("b").innerText;
let ca = Number(b.querySelector(".ca").value || 0);
let exam = Number(b.querySelector(".exam").value || 0);

let sum = ca + exam;
total += sum;

data[name] = {ca, exam, total:sum};
});

let avg = total / boxes.length;
let grade = avg>=70?"A":avg>=60?"B":avg>=50?"C":"F";
let status = avg>=50?"PASS":"FAIL";

await addDoc(collection(db,"results"), {
studentID:id,
term:t,
session:s,
subjects:data,
total,
average:avg,
grade,
status
});

/* SUMMARY */
resultPreview.innerHTML = `
<h3>Result Summary</h3>
Total: ${total}<br>
Average: ${avg.toFixed(2)}<br>
Grade: ${grade}<br>
Status: ${status}
`;

alert("Saved ✔");

/* CLEAR */
studentID.value="";
term.value="";
session.value="";
subjects.innerHTML="";
studentName.innerHTML="";
};

</script>

</body>
</html>
