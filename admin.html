<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{font-family:Arial;background:#0a0a0f;color:white;}
.card{max-width:700px;margin:auto;background:#16161f;padding:20px;border-radius:10px;margin-top:20px;}
input,select,button{width:100%;padding:10px;margin-top:10px;}
button{background:#00e5c0;border:none;cursor:pointer;}
.hidden{display:none;}
.menu button{margin-top:5px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<div id="dashboard" class="hidden">

<div class="card menu">
<h2>DASHBOARD</h2>
<button onclick="showSection('studentSection')">Add Student</button>
<button onclick="showSection('resultSection')">Add Result</button>
</div>

<!-- ================= ADD STUDENT ================= -->
<div id="studentSection" class="card hidden">

<h3>Add Student</h3>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">

<select id="state" onchange="loadLGA()">
<option value="">Select State</option>
<option>Kano</option>
<option>Lagos</option>
<option>Kaduna</option>
<option>Abuja</option>
</select>

<select id="lga">
<option>Select LGA</option>
</select>

<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone Number">
<input id="emailStudent" placeholder="Email">

<select id="department">
<option>Science</option>
<option>Arts</option>
</select>

<select id="level">
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option>Public</option>
<option>Private</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option>No</option>
<option>Yes</option>
</select>

<button onclick="addStudent()">Save Student</button>

</div>

<!-- ================= ADD RESULT ================= -->
<div id="resultSection" class="card hidden">

<h3>Add Result</h3>

<input id="studentID" placeholder="Enter Student ID" oninput="loadStudent()">
<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="saveResult()">Save Result</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async function(){
try{
await signInWithEmailAndPassword(auth,email.value.trim(),password.value.trim());
loginBox.style.display="none";
dashboard.classList.remove("hidden");
}catch(e){
msg.innerHTML = e.code;
}
};

/* MENU */
window.showSection = function(id){
document.querySelectorAll("#dashboard .card").forEach(c=>{
if(!c.classList.contains("menu")) c.classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
};

/* STATE → LGA */
window.loadLGA = function(){
let state = document.getElementById("state").value;

let data = {
"Kano":["Nasarawa","Dala","Gwale","Fagge","Tarauni"],
"Lagos":["Ikeja","Lekki","Yaba"],
"Kaduna":["Zaria","Kafanchan"],
"Abuja":["Gwagwalada","Kuje"]
};

lga.innerHTML = "";

(data[state]||[]).forEach(l=>{
lga.innerHTML += `<option>${l}</option>`;
});
};

/* ADD STUDENT */
window.addStudent = async function(){

let dept = department.value;
let code = dept==="Science"?"SCI":"ART";
let id = "STA/2026/"+code+"/"+Math.floor(Math.random()*1000);

await addDoc(collection(db,"students"),{
studentID:id,
name:name.value,
age:age.value,
state:state.value,
lga:lga.value,
address:address.value,
phone:phone.value,
email:emailStudent.value,
department:dept,
level:level.value,
schoolType:schoolType.value,
schoolName:schoolName.value,
graduated:graduated.value
});

alert("Student Added: "+id);
};

/* LOAD STUDENT */
window.loadStudent = async function(){

const snap = await getDocs(collection(db,"students"));
let found=false;

snap.forEach(doc=>{
let s=doc.data();

if(s.studentID===studentID.value){
studentName.innerHTML="Name: "+s.name;

found=true;

if(s.department==="Science"){
loadSubjects("Science");
}else{
loadSubjects("Arts");
}
}
});

if(!found){
studentName.innerHTML="Student not found ❌";
subjects.innerHTML="";
}
};

/* SUBJECTS */
function loadSubjects(type){

let list = type==="Science"
? ["English","Biology","Chemistry","Physics","Mathematics"]
: ["English","Literature","Government","Economics","Islamic Studies"];

subjects.innerHTML="";

list.forEach(sub=>{
subjects.innerHTML+=`
<label>${sub}</label>
<input class="score" type="number">
`;
});
}

/* SAVE RESULT */
window.saveResult = async function(){

if(studentName.innerHTML.includes("not found")){
alert("Invalid Student ID");
return;
}

let scores=document.querySelectorAll(".score");
let total=0;

scores.forEach(s=> total+=Number(s.value));

let avg=total/scores.length;

let grade="F";
if(avg>=70)grade="A";
else if(avg>=60)grade="B";
else if(avg>=50)grade="C";

await addDoc(collection(db,"results"),{
studentID:studentID.value,
total,
average:avg,
grade,
status:total>=250?"PASS":"FAIL",
term:term.value,
session:session.value
});

alert("Result Saved ✔");
};

</script>

</body>
</html>
