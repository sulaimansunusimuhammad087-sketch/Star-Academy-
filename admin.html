<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-bottom:50px;
}

nav{
background:#16161f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{height:80px;border-radius:12px}

nav a{
color:#00e5c0;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.card{
max-width:800px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00e5c0;
border:none;
font-weight:bold;
cursor:pointer;
}

.subject-box{
background:#111;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.hidden{display:none}
</style>
</head>

<body>
<div class="overlay">

<nav>
<img src="logo.png" class="logo">
<div>
<a href="index.html">Home</a>
<a href="student.html">Student</a>
</div>
</nav>

<div class="card">

<h3>ADD STUDENT RESULT</h3>

<input id="studentID" placeholder="Student ID" oninput="loadStudent()">
<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="saveResult()">Save Result</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db = getFirestore(app);

/* LOAD STUDENT */
window.loadStudent = async ()=>{

let id = studentID.value.trim();

if(!id) return;

let q = query(collection(db,"students"), where("studentID","==",id));
let snap = await getDocs(q);

if(snap.empty){
studentName.innerHTML="Not found";
subjects.innerHTML="";
return;
}

let s = snap.docs[0].data();

studentName.innerHTML = `${s.name} | ${s.level} | ${s.department}`;

let list = s.department==="Science"
? ["English","Biology","Chemistry","Physics","Mathematics"]
: ["English","Literature","Government","Economics","Islamic Studies"];

subjects.innerHTML="";

list.forEach(sub=>{
subjects.innerHTML += `
<div class="subject-box">
<b>${sub}</b>
<input class="ca" placeholder="CA (0-40)" type="number">
<input class="exam" placeholder="Exam (0-60)" type="number">
</div>`;
});
};

/* SAVE RESULT (REAL VALUES ONLY) */
window.saveResult = async ()=>{

let id = studentID.value;
let t = term.value;
let s = session.value;

let ca = document.querySelectorAll(".ca");
let exam = document.querySelectorAll(".exam");

let subjectsData = {};

let total = 0;

for(let i=0;i<ca.length;i++){

let caVal = Number(ca[i].value || 0);
let examVal = Number(exam[i].value || 0);
let subjectTotal = caVal + examVal;

total += subjectTotal;

subjectsData[`sub${i}`] = {
ca: caVal,
exam: examVal,
total: subjectTotal
};
}

let avg = total / ca.length;
let grade = avg>=70?"A":avg>=60?"B":avg>=50?"C":"F";
let status = avg>=50?"PASS":"FAIL";

await addDoc(collection(db,"results"),{
studentID:id,
subjects:subjectsData,
total,
average:avg,
grade,
status,
term:t,
session:s
});

alert("Result Saved ✔");
};
</script>

</body>
</html>
