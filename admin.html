<!DOCTYPE html>
<html>
<head>
<title>Admin Portal</title>

<style>
body { font-family:Arial; background:#0a0a0f; color:white; text-align:center; }
.card { background:#16161f; padding:20px; max-width:600px; margin:auto; border-radius:10px; }
input,button { width:100%; padding:10px; margin-top:10px; }
button { background:#00e5c0; border:none; font-weight:bold; cursor:pointer; }
.hidden{display:none;}
a{color:#00e5c0;}
</style>
</head>

<body>

<div id="login" class="card">
<h2>ADMIN LOGIN</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="index.html">← Back Home</a>

<p id="msg"></p>
</div>

<div id="dash" class="hidden">

<div class="card">
<h2>ADMIN DASHBOARD</h2>

<a href="index.html">← Back Home</a>

<h3>Add Student Result</h3>

<input id="sid" placeholder="Student ID">
<input id="score" placeholder="Total Score">
<input id="grade" placeholder="Grade (A/B/C)">
<input id="status" placeholder="PASS / FAIL">
<input id="term" placeholder="Term">
<input id="session" placeholder="Session">

<button onclick="addResult()">Save Result</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN FIXED WITH REAL ERROR */
window.login = async function(){
try{

msg.innerHTML = "Logging in...";

await signInWithEmailAndPassword(auth,email.value,password.value);

login.style.display="none";
dash.classList.remove("hidden");

}catch(e){

msg.innerHTML = "❌ Login failed: " + e.message;

}
};

/* ADD RESULT (IMPORTANT FIX) */
window.addResult = async function(){

await addDoc(collection(db,"results"),{
studentID:sid.value,
total:Number(score.value),
grade:grade.value,
status:status.value,
term:term.value,
session:session.value,
createdAt:Date.now()
});

alert("Result Saved ✔");

};

</script>

</body>
</html>
