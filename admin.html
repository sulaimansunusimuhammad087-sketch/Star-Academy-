<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{
font-family:Arial;
background:#0a0a0f;
color:white;
}

.card{
max-width:750px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
}

button{
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

.hidden{display:none;}
.menu button{margin-top:8px;}
h2,h3{color:#00e5c0;}
a{color:#00e5c0; cursor:pointer;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card menu">
<h2>DASHBOARD</h2>
<button onclick="showSection('studentSection')">Add Student</button>
<button onclick="showSection('resultSection')">Add Result</button>
<button onclick="goHome()">Home</button>
</div>

<!-- ADD STUDENT -->
<div id="studentSection" class="card hidden">

<h3>Add Student</h3>
<a onclick="goHome()">← Back</a>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone Number">
<input id="emailStudent" placeholder="Student Email">

<select id="department">
<option value="">Department</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
</select>

<select id="level">
<option value="">Level</option>
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>AI Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option value="">School Type</option>
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option value="">Graduated</option>
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>

</div>

<!-- ADD RESULT -->
<div id="resultSection" class="card hidden">

<h3>Add Result</h3>
<a onclick="goHome()">← Back</a>

<input id="studentID" placeholder="Enter Student ID" oninput="loadStudent()">

<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option value="">Term</option>
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="saveResult()">Save Result</button>

<div id="resultPreview" class="card hidden"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, runTransaction,
query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* SAFE LOGIN */
window.login = async function(){
try{
const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();

await signInWithEmailAndPassword(auth,email,pass);

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").classList.remove("hidden");

}catch(e){
document.getElementById("msg").innerText = "Login failed: " + e.message;
}
};

/* NAV */
window.showSection = function(id){
document.querySelectorAll("#dashboard .card").forEach(c=>{
if(!c.classList.contains("menu")) c.classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
};

window.goHome = function(){
document.querySelectorAll("#dashboard .card").forEach(c=>{
if(!c.classList.contains("menu")) c.classList.add("hidden");
});
};

/* ID GENERATOR */
async function generateID(dept){
const ref = doc(db,"meta","counter");

const num = await runTransaction(db, async (tx)=>{
const snap = await tx.get(ref);
let count = snap.exists()?snap.data().count+1:1;
tx.set(ref,{count});
return count;
});

let code = dept==="Science"?"SCI":"ART";
return `STA/2026/${code}/${String(num).padStart(5,"0")}`;
}

/* FIXED ADD STUDENT (NO CRASH) */
window.addStudent = async function(){

try{

const data = {
name: document.getElementById("name").value.trim(),
age: document.getElementById("age").value.trim(),
gender: document.getElementById("gender").value,
state: document.getElementById("state").value.trim(),
lga: document.getElementById("lga").value.trim(),
address: document.getElementById("address").value.trim(),
phone: document.getElementById("phone").value.trim(),
email: document.getElementById("emailStudent").value.trim(),
department: document.getElementById("department").value,
level: document.getElementById("level").value,
schoolType: document.getElementById("schoolType").value,
schoolName: document.getElementById("schoolName").value.trim(),
graduated: document.getElementById("graduated").value
};

/* VALIDATION */
for(let k in data){
if(data[k] === ""){
alert("Fill all fields ❗");
return;
}
}

let id = await generateID(data.department);

await addDoc(collection(db,"students"),{
studentID:id,
...data,
createdAt:Date.now()
});

alert("Student Added ✔ " + id);

/* CLEAR */
document.querySelectorAll("#studentSection input").forEach(i=>i.value="");
document.querySelectorAll("#studentSection select").forEach(s=>s.value="");

}catch(err){
alert("ERROR: " + err.message);
}

};

/* LOAD STUDENT */
window.loadStudent = async function(){

let id = document.getElementById("studentID").value.trim();

if(!id){
document.getElementById("studentName").innerText="";
document.getElementById("subjects").innerHTML="";
return;
}

const q = query(collection(db,"students"), where("studentID","==",id));
const snap = await getDocs(q);

if(snap.empty){
document.getElementById("studentName").innerText="Student not found ❌";
document.getElementById("subjects").innerHTML="";
return;
}

let s = snap.docs[0].data();

document.getElementById("studentName").innerText =
`Name: ${s.name} | Class: ${s.level} | Dept: ${s.department}`;

let subjects = s.department==="Science"
? ["English","Biology","Chemistry","Physics","Mathematics"]
: ["English","Literature","Government","Economics","Islamic Studies"];

let box = document.getElementById("subjects");
box.innerHTML="";

subjects.forEach(sub=>{
box.innerHTML += `<input class="score" type="number" placeholder="${sub}">`;
});
};

/* SAVE RESULT */
window.saveResult = async function(){

let id = document.getElementById("studentID").value.trim();
let term = document.getElementById("term").value;
let session = document.getElementById("session").value;

if(!id || !term || !session){
alert("Fill all fields");
return;
}

let scores = document.querySelectorAll(".score");

let total = 0;
scores.forEach(s=> total += Number(s.value||0));

let avg = total / scores.length;

let grade = avg>=70?"A":avg>=60?"B":avg>=50?"C":"F";
let status = total>=250?"PASS":"FAIL";

await addDoc(collection(db,"results"),{
studentID:id,
total,
average:avg,
grade,
status,
term,
session,
createdAt:Date.now()
});

/* PREVIEW */
document.getElementById("resultPreview").classList.remove("hidden");
document.getElementById("resultPreview").innerHTML = `
<h3>Result Summary</h3>
Total: ${total}<br>
Average: ${avg.toFixed(2)}<br>
Grade: ${grade}<br>
Status: ${status}<br>
`;

alert("Result Saved ✔");
};

</script>

</body>
</html>
