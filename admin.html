<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{font-family:Arial;background:#0a0a0f;color:white;}
.card{max-width:600px;margin:auto;background:#16161f;padding:20px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin-top:10px;}
button{background:#00e5c0;border:none;cursor:pointer;}
a{color:#00e5c0;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="card">

<h2>ADMIN LOGIN</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden">

<div class="card">

<h2>ADMIN DASHBOARD</h2>

<a href="index.html">← Home</a>

<hr>

<h3>Add Result</h3>

<input id="sid" placeholder="Student ID">
<input id="total" placeholder="Total Score">
<input id="grade" placeholder="Grade">
<input id="status" placeholder="PASS / FAIL">
<input id="term" placeholder="Term">
<input id="session" placeholder="Session">

<button onclick="addResult()">Save Result</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system",
storageBucket: "star-academy-system.firebasestorage.app",
messagingSenderId: "615097211278",
appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function(){

try{

const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();

await signInWithEmailAndPassword(auth,email,pass);

document.querySelector(".card").style.display="none";
document.getElementById("dash").classList.remove("hidden");

msg.innerHTML="Login success";

}catch(e){
msg.innerHTML = "Login failed: " + e.code;
}

};

/* ADD RESULT */
window.addResult = async function(){

await addDoc(collection(db,"results"),{
studentID: sid.value.trim(),
total: total.value,
grade: grade.value,
status: status.value,
term: term.value,
session: session.value,
createdAt: Date.now()
});

alert("Saved ✔");

};

</script>

</body>
</html>
