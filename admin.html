<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-bottom:50px;
}

nav{
background:#16161f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
height:80px;
border-radius:12px;
}

nav a{
color:#00e5c0;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.card{
max-width:800px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

.hidden{display:none;}

.back{
color:#00e5c0;
cursor:pointer;
margin-bottom:10px;
display:inline-block;
}

.subject-box{
background:#111;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>
<div class="overlay">

<nav>
<img src="logo.png" class="logo">
<div>
<a href="index.html">Home</a>
<a href="student.html">Student</a>
</div>
</nav>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card" id="menu">
<h2>DASHBOARD</h2>
<button onclick="showSection('studentSection')">Student Registration</button>
<button onclick="showSection('resultSection')">Add Students Results</button>
<button onclick="showSection('deleteSection')">Delete Student</button>
<button onclick="showSection('manageSection')">Manage Students</button>
</div>
<div class="card">
<h3>Export Data for Analysis</h3>

<select id="exportTerm">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="exportSession" placeholder="Session e.g 2025/2026">

<button onclick="exportFullData()">Download Full Dataset</button>
</div>

 <div class="card">
<h3>Edit Student Result</h3>

<input id="editStudentID" placeholder="Enter Student ID">

<select id="editTerm">
<option value="">Select Term</option>
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="editSession" placeholder="Session e.g 2025/2026">

<button onclick="loadResultForEdit()">Load Result</button>

<div id="editSubjects"></div>

<button onclick="updateResult()">Update Result</button>
</div> 
  
<!-- DELETE -->
<div id="deleteSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Delete Student</h3>

<input id="deleteID" placeholder="Enter Student ID">

<button onclick="deleteStudent()">Delete Student</button>
</div>

<!-- MANAGE STUDENTS -->
<div id="manageSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Search & Edit Student</h3>

<input id="searchInput" placeholder="Search by ID, Name, or Level">

<button onclick="searchStudent()">Search</button>

<div id="searchResults"></div>

</div>
  
<!-- STUDENT -->
<div id="studentSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Student Registration</h3>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone Number">
<input id="emailStudent" placeholder="Student Email">

<select id="department">
<option value="">Department</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
</select>

<select id="level">
<option value="">Level</option>
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>AI Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option value="">School Type</option>
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option value="">Graduated</option>
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>
</div>

<!-- RESULT -->
<div id="resultSection" class="card hidden">
<div class="back" onclick="goHome()">← Back</div>

<h3>Add Students Results</h3>

<input id="studentID" placeholder="Enter Student ID" oninput="loadStudent()">

<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option value="">Term</option>
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="saveResult()">Save Result</button>

<div id="resultPreview"></div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, runTransaction,
query, where, getDocs, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system",
storageBucket: "star-academy-system.appspot.com",
messagingSenderId: "615097211278",
appId: "1:615097211278:web:5a7625b162185ff8e92cdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async () => {
try {
await signInWithEmailAndPassword(
auth,
document.getElementById("email").value,
document.getElementById("password").value
);

loginBox.style.display = "none";
dashboard.classList.remove("hidden");

} catch (e) {
msg.innerText = e.message;
}
};

/* NAV */
window.showSection = (id) => {
menu.classList.add("hidden");
studentSection.classList.add("hidden");
resultSection.classList.add("hidden");
deleteSection.classList.add("hidden");
manageSection.classList.add("hidden");

document.getElementById(id).classList.remove("hidden");
};

window.goHome = () => {
menu.classList.remove("hidden");
studentSection.classList.add("hidden");
resultSection.classList.add("hidden");
deleteSection.classList.add("hidden");
manageSection.classList.add("hidden");
};

/* ADD STUDENT */
window.addStudent = async () => {

let nameVal = document.getElementById("name").value.trim();
let phoneVal = document.getElementById("phone").value.trim();
let emailVal = document.getElementById("emailStudent").value.trim();
let dept = document.getElementById("department").value;

if(!nameVal || !phoneVal || !dept){
alert("Fill required fields");
return;
}

/* duplicate check */
let q1 = query(collection(db,"students"), where("phone","==",phoneVal));
let q2 = query(collection(db,"students"), where("email","==",emailVal));

if(!(await getDocs(q1)).empty || !(await getDocs(q2)).empty){
alert("Student already exists");
return;
}

/* ID counter */
let ref = doc(db,"meta", dept==="Science"?"scienceCounter":"artsCounter");

let id = await runTransaction(db, async (tx)=>{
let snap = await tx.get(ref);
let count = snap.exists() ? snap.data().count+1 : 1;
tx.set(ref,{count});

return `STA/2026/${dept==="Science"?"SCI":"ART"}/${String(count).padStart(5,"0")}`;
});

/* SAVE */
await addDoc(collection(db,"students"),{
studentID:id,
name:nameVal,
age:age.value,
gender:gender.value,
state:state.value,
lga:lga.value,
address:address.value,
phone:phoneVal,
email:emailVal,
department:dept,
level:level.value,
schoolType:schoolType.value,
schoolName:schoolName.value,
graduated:graduated.value,
createdAt:Date.now()
});

alert("Saved ✔ " + id);

/* clear */
document.querySelectorAll("#studentSection input").forEach(i=>i.value="");
document.querySelectorAll("#studentSection select").forEach(s=>s.value="");
};

/* LOAD STUDENT */
window.loadStudent = async () => {

let id = studentID.value.trim();
if(!id) return;

let q = query(collection(db,"students"), where("studentID","==",id));
let snap = await getDocs(q);

if(snap.empty){
studentName.innerHTML = "Not found";
subjects.innerHTML = "";
return;
}

let s = snap.docs[0].data();

studentName.innerHTML = `<b>${s.name}</b> | ${s.department}`;

let list = [];

if(s.level === "Fresh Class"){
list = ["General English","Oral English","Grammar","Public Speaking","Novel"];
}
else if(s.department === "Science"){
list = ["English","Biology","Chemistry","Physics","Mathematics"];
}
else{
list = ["English","Literature","Government","Economics","Islamic Studies"];
}

subjects.innerHTML = "";

list.forEach(sub=>{
subjects.innerHTML += `
<div class="subject-box">
<b>${sub}</b><br>
CA <input class="ca" type="number">
Exam <input class="exam" type="number">
</div>`;
});
};

/* SAVE RESULT */
window.saveResult = async () => {

let id = studentID.value;
let t = term.value;
let s = session.value;

let check = query(collection(db,"results"),
where("studentID","==",id),
where("term","==",t),
where("session","==",s)
);

if(!(await getDocs(check)).empty){
alert("Already exists");
return;
}

let boxes = document.querySelectorAll(".subject-box");

let data = {};
let total = 0;

boxes.forEach(b=>{
let name = b.querySelector("b").innerText;
let ca = Number(b.querySelector(".ca").value || 0);
let exam = Number(b.querySelector(".exam").value || 0);

let sum = ca + exam;
total += sum;

data[name] = {ca, exam, total:sum};
});

let avg = total / boxes.length;

  let qStudent = query(collection(db,"students"), where("studentID","==",id));
let snapStudent = await getDocs(qStudent);

if(snapStudent.empty){
alert("Student not found");
return;
}
document.getElementById("resultPreview").innerHTML = `
<div class="card">
<h3>Result Summary</h3>
<b>Total:</b> ${total}<br>
<b>Average:</b> ${avg.toFixed(2)}<br>
<b>Grade:</b> ${avg>=70?"A":avg>=60?"B":avg>=50?"C":"F"}<br>
<b>Status:</b> ${avg>=50?"PASS":"FAIL"}<br>
</div>
`;
  
let studentData = snapStudent.docs[0].data();
  
await addDoc(collection(db,"results"),{
studentID:id,
term:t,
session:s,
subjects:data,
total,
average:avg,
grade:avg>=70?"A":avg>=60?"B":avg>=50?"C":"F",
status:avg>=50?"PASS":"FAIL", 
classAtTime: studentData.level,  
createdAt: Date.now()
});

alert("Saved ✔");

studentID.value = "";
term.value = "";
session.value = "";
subjects.innerHTML = "";
studentName.innerHTML = "";                }

/* DELETE STUDENT */
window.deleteStudent = async () => {

let id = deleteID.value.trim();
if(!id) return alert("Enter ID");

/* delete student */
let q = query(collection(db,"students"), where("studentID","==",id));
let snap = await getDocs(q);

snap.forEach(d=>deleteDoc(d.ref));

/* delete results */
let rq = query(collection(db,"results"), where("studentID","==",id));
let rsnap = await getDocs(rq);

rsnap.forEach(d=>deleteDoc(d.ref));

alert("Deleted ✔");
};

/* SEARCH */
window.searchStudent = async () => {

let input = searchInput.value.toLowerCase();
searchResults.innerHTML = "Searching...";

let snap = await getDocs(collection(db,"students"));

let results = [];

snap.forEach(d=>{
let s = d.data();

if(
s.studentID.toLowerCase().includes(input) ||
s.name.toLowerCase().includes(input) ||
s.level.toLowerCase().includes(input)
){
results.push({id:d.id,...s});
}
});

if(results.length===0){
searchResults.innerHTML = "No student found";
return;
}

searchResults.innerHTML = "";

results.forEach(s=>{
searchResults.innerHTML += `
<div class="card">

<b>Name:</b> ${s.name}<br>
<b>ID:</b> ${s.studentID}<br>
<b>Level:</b> ${s.level}<br>
<b>Department:</b> ${s.department}<br>
<b>Phone:</b> ${s.phone}<br>
<b>Email:</b> ${s.email}<br>
<b>Age:</b> ${s.age}<br>
<b>State:</b> ${s.state}<br>
<b>LGA:</b> ${s.lga}<br>
<b>Address:</b> ${s.address}<br>

<button onclick="editStudent('${s.id}')">Edit Student</button>

</div>`;
}); 
};

/* EDIT STUDENT */
window.editStudent = async (id) => {

let ref = doc(db,"students",id);

let snap = await getDocs(collection(db,"students"));

let student;
snap.forEach(d=>{
if(d.id===id) student = d.data();
});

if(!student){
alert("Not found");
return;
}

let newName = prompt("Name:", student.name);
let newPhone = prompt("Phone:", student.phone);
let newLevel = prompt("Level:", student.level);
let newDept = prompt("Department:", student.department);
let newEmail = prompt("Email:", student.email);
let newState = prompt("State:", student.state);
let newLga = prompt("LGA:", student.lga);
let newAddress = prompt("Address:", student.address);
let newAge = prompt("Age:", student.age);

if(!newName || !newPhone) return;

await updateDoc(ref,{
name:newName,
phone:newPhone,
level:newLevel,
department:newDept,
email:newEmail,
state:newState,
lga:newLga,
address:newAddress,
age:newAge
});

alert("Updated ✔");
};

/* EXPORT FULL DATASET */
window.exportFullData = async () => {

let term = document.getElementById("exportTerm").value;
let session = document.getElementById("exportSession").value;

if(!term || !session){
  alert("Enter term and session");
  return;
}

/* GET RESULTS */
let q = query(
  collection(db, "results"),
  where("term", "==", term),
  where("session", "==", session)
);

let resultSnap = await getDocs(q);

if(resultSnap.empty){
  alert("No data found");
  return;
}

/* GET STUDENTS */
let studentSnap = await getDocs(collection(db,"students"));

let studentsMap = {};
studentSnap.forEach(doc=>{
  let s = doc.data();
  studentsMap[s.studentID] = s;
});

/* COLLECT SUBJECTS */
let allSubjects = new Set();

resultSnap.forEach(rDoc=>{
let subjects = rDoc.data().subjects || {};
  Object.keys(subjects).forEach(sub => allSubjects.add(sub));
});

allSubjects = Array.from(allSubjects);

/* HEADER */
let header = [
"StudentID","Name","Age","Gender","State","LGA",
"Department","Level","SchoolType","Graduated",
"Term","Session"
];

allSubjects.forEach(sub=>{
  header.push(`${sub}_CA`, `${sub}_Exam`, `${sub}_Total`);
});

header.push("Total","Average","Grade","Status");

/* ROWS */
let rows = [header];

resultSnap.forEach(rDoc=>{

  let r = rDoc.data();
  let s = studentsMap[r.studentID] || {};
  let subjects = r.subjects || {};

  let row = [
    r.studentID,
    s.name || "",
    s.age || "",
    s.gender || "",
    s.state || "",
    s.lga || "",
    s.department || "",
    s.level || "",
    s.schoolType || "",
    s.graduated || "",
    r.term,
    r.session
  ];

  allSubjects.forEach(sub=>{
    let subData = subjects[sub] || {};
    row.push(
      subData.ca || 0,
      subData.exam || 0,
      subData.total || 0
    );
  });

  row.push(
    r.total,
    r.average,
    r.grade,
    r.status
  );

  rows.push(row);
});

/* CSV */
let csv = rows.map(row => 
  row.map(value => `"${value}"`).join(",")
).join("\n");

/* DOWNLOAD */
let blob = new Blob([csv], { type: "text/csv" });
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = `${term}_${session}_FULL_DATASET.csv`;
a.click();

URL.revokeObjectURL(url);

alert("Download started ✔");
};

 window.loadResultForEdit = async () => {

let id = editStudentID.value.trim();
let term = editTerm.value;
let session = editSession.value;

if(!id || !term || !session){
  alert("Fill all fields");
  return;
}

let q = query(
  collection(db,"results"),
  where("studentID","==",id),
  where("term","==",term),
  where("session","==",session)
);

let snap = await getDocs(q);

if(snap.empty){
  alert("Result not found");
  return;
}

let docData = snap.docs[0];
window.editDocId = docData.id;

let data = docData.data();
let subjects = data.subjects;

editSubjects.innerHTML = "";

Object.keys(subjects).forEach(sub => {
  let s = subjects[sub];

  editSubjects.innerHTML += `
  <div class="subject-box">
    <b>${sub}</b><br>
    CA <input class="edit-ca" type="number" value="${s.ca}">
    Exam <input class="edit-exam" type="number" value="${s.exam}">
  </div>
  `;
});
};

  
 window.updateResult = async () => {

if(!window.editDocId){
  alert("Load result first");
  return;
}

let boxes = document.querySelectorAll("#editSubjects .subject-box");

let data = {};
let total = 0;

boxes.forEach(b => {
  let name = b.querySelector("b").innerText;
  let ca = Number(b.querySelector(".edit-ca").value || 0);
  let exam = Number(b.querySelector(".edit-exam").value || 0);

  let sum = ca + exam;
  total += sum;

  data[name] = {ca, exam, total: sum};
});

let avg = total / boxes.length;

await updateDoc(doc(db,"results",window.editDocId),{
  subjects: data,
  total: total,
  average: avg,
  grade: avg>=70?"A":avg>=60?"B":avg>=50?"C":"F",
  status: avg>=50?"PASS":"FAIL"
});

alert("Updated ✔");

/* clear */
editSubjects.innerHTML = "";
editStudentID.value = "";
editTerm.value = "";
editSession.value = "";
window.editDocId = null;
}; 
</script>

</body>
</html>
