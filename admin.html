<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

.logo{height:80px}

.card{
max-width:850px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

.subject-box{
background:#111;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.back{
color:#00e5c0;
cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">

<nav>
<img src="logo.png" class="logo">
</nav>

<!-- STUDENT REGISTRATION -->
<div class="card">
<h2>Student Registration</h2>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<select id="department">
<option>Science</option>
<option>Arts</option>
</select>

<select id="level">
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>AI Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<input id="phone" placeholder="Phone">
<input id="emailStudent" placeholder="Email">

<button onclick="addStudent()">Save Student</button>
</div>

<!-- RESULT SECTION -->
<div class="card">
<h2>Add Result</h2>

<input id="studentID" placeholder="Student ID" oninput="loadStudent()">

<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2026/2027">

<button onclick="saveResult()">Save Result</button>

<p id="msg"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, query, where, getDocs, doc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain:"star-academy-system.firebaseapp.com",
projectId:"star-academy-system"
});

const db = getFirestore(app);

/* ADD STUDENT */
window.addStudent = async ()=>{

let idRef = doc(db,"meta","counter");

let newID = await runTransaction(db, async tx=>{
let snap = await tx.get(idRef);
let count = snap.exists()?snap.data().count+1:1;
tx.set(idRef,{count});

return `STA/2026/${department.value==="Science"?"SCI":"ART"}/${String(count).padStart(5,"0")}`;
});

await addDoc(collection(db,"students"),{
studentID:newID,
name:name.value,
age:age.value,
gender:gender.value,
department:department.value,
level:level.value,
phone:phone.value,
email:emailStudent.value
});

alert("Saved ✔ " + newID);
};

/* LOAD STUDENT */
window.loadStudent = async ()=>{

let id = studentID.value.trim();

let q = query(collection(db,"students"), where("studentID","==",id));
let snap = await getDocs(q);

if(snap.empty){
studentName.innerHTML="Not found";
subjects.innerHTML="";
return;
}

let s = snap.docs[0].data();

studentName.innerHTML = s.name + " | " + s.department;

let list = s.department==="Science"
? ["English","Biology","Chemistry","Physics","Mathematics"]
: ["English","Literature","Government","Economics","Islamic Studies"];

subjects.innerHTML="";

list.forEach(sub=>{
subjects.innerHTML += `
<div class="subject-box">
<b>${sub}</b>
<input class="ca" placeholder="CA">
<input class="exam" placeholder="Exam">
</div>`;
});
};

/* SAVE RESULT (REAL DATA) */
window.saveResult = async ()=>{

let id = studentID.value;
let t = term.value;
let s = session.value;

let caEls = document.querySelectorAll(".ca");
let exEls = document.querySelectorAll(".exam");
let subs = document.querySelectorAll(".subject-box b");

let subjects = {};
let total = 0;

for(let i=0;i<subs.length;i++){

let ca = Number(caEls[i].value||0);
let exam = Number(exEls[i].value||0);
let sum = ca+exam;

subjects[subs[i].innerText] = {ca,exam,total:sum};
total += sum;
}

let avg = total / subs.length;

let grade =
avg>=70?"A":
avg>=60?"B":
avg>=50?"C":"F";

let status = avg>=50?"PASS":"FAIL";

await addDoc(collection(db,"results"),{
studentID:id,
subjects,
total,
average:avg,
grade,
status,
term:t,
session:s
});

msg.innerHTML = "Result Saved ✔";
};

</script>

</body>
</html>
