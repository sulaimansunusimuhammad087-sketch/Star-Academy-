<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{font-family:Arial;background:#0a0a0f;color:white;}
.card{max-width:700px;margin:auto;background:#16161f;padding:20px;border-radius:10px;margin-top:20px;}
input,select,button{width:100%;padding:10px;margin-top:10px;}
button{background:#00e5c0;border:none;cursor:pointer;}
.hidden{display:none;}
.menu button{margin-top:5px;}
h2,h3{color:#00e5c0;}
</style>
</head>

<body>

<div class="card" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<div id="dashboard" class="hidden">

<div class="card menu">
<h2>DASHBOARD</h2>
<button onclick="showSection('studentSection')">Add Student</button>
<button onclick="showSection('resultSection')">Add Result</button>
</div>

<!-- ADD STUDENT -->
<div id="studentSection" class="card hidden">

<h3>Add Student</h3>

<input id="name">
<input id="age" type="number">
<input id="state">
<input id="lga">
<input id="address">
<input id="phone">
<input id="emailStudent">

<select id="department">
<option value="">Select Department</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
</select>

<select id="level">
<option value="">Select Level</option>
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>AI Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option value="">School Type</option>
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName">

<select id="graduated">
<option value="">Graduated?</option>
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>

</div>

<!-- ADD RESULT -->
<div id="resultSection" class="card hidden">

<h3>Add Result</h3>

<input id="studentID" oninput="loadStudent()">
<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option value="">Select Term</option>
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session">

<button onclick="saveResult()">Save Result</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, runTransaction,
query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async function(){
try{
const emailVal = document.getElementById("email").value.trim();
const passVal = document.getElementById("password").value.trim();

await signInWithEmailAndPassword(auth,emailVal,passVal);

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").classList.remove("hidden");

}catch(e){
document.getElementById("msg").innerHTML = e.message;
}
};

/* MENU */
window.showSection = function(id){
document.querySelectorAll("#dashboard .card").forEach(c=>{
if(!c.classList.contains("menu")) c.classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
};

/* ID GENERATOR */
async function generateID(dept){
const ref = doc(db,"meta","counter");

const num = await runTransaction(db, async (tx)=>{
const snap = await tx.get(ref);
let count = snap.exists()? snap.data().count + 1 : 1;
tx.set(ref,{count});
return count;
});

let code = dept==="Science"?"SCI":"ART";
return `STA/2026/${code}/${String(num).padStart(5,"0")}`;
}

/* ADD STUDENT (FIXED) */
window.addStudent = async function(){

const data = {
name: document.getElementById("name").value.trim(),
age: document.getElementById("age").value.trim(),
state: document.getElementById("state").value.trim(),
lga: document.getElementById("lga").value.trim(),
address: document.getElementById("address").value.trim(),
phone: document.getElementById("phone").value.trim(),
email: document.getElementById("emailStudent").value.trim(),
department: document.getElementById("department").value,
level: document.getElementById("level").value,
schoolType: document.getElementById("schoolType").value,
schoolName: document.getElementById("schoolName").value.trim(),
graduated: document.getElementById("graduated").value
};

if(Object.values(data).some(v => v==="")){
alert("Fill all fields ❗");
return;
}

let id = await generateID(data.department);

await addDoc(collection(db,"students"),{
studentID:id,
...data,
createdAt: Date.now()
});

document.querySelectorAll("#studentSection input").forEach(i=>i.value="");
document.querySelectorAll("#studentSection select").forEach(s=>s.value="");

alert("Student Added: " + id);
};

/* LOAD STUDENT */
window.loadStudent = async function(){

let id = document.getElementById("studentID").value.trim();

if(!id){
studentName.innerHTML="";
subjects.innerHTML="";
return;
}

const q = query(collection(db,"students"), where("studentID","==",id));
const snap = await getDocs(q);

if(snap.empty){
studentName.innerHTML = "Student not found ❌";
subjects.innerHTML="";
return;
}

let s = snap.docs[0].data();

studentName.innerHTML = "Name: " + s.name;

loadSubjects(s.department);
};

/* SUBJECTS */
function loadSubjects(type){

let list = type==="Science"
? ["English","Biology","Chemistry","Physics","Mathematics"]
: ["English","Literature","Government","Economics","Islamic Studies"];

subjects.innerHTML="";

list.forEach(sub=>{
subjects.innerHTML += `<input class="score" type="number" placeholder="${sub}">`;
});
}

/* SAVE RESULT */
window.saveResult = async function(){

let id = document.getElementById("studentID").value.trim();
let termVal = document.getElementById("term").value;
let sessionVal = document.getElementById("session").value;

if(!id || !termVal || !sessionVal){
alert("Fill all fields");
return;
}

let scores = document.querySelectorAll(".score");

let total = 0;
scores.forEach(s=> total += Number(s.value || 0));

let avg = total / scores.length;

await addDoc(collection(db,"results"),{
studentID:id,
total,
average:avg,
grade: avg>=70?"A":avg>=60?"B":avg>=50?"C":"F",
status: total>=250?"PASS":"FAIL",
term: termVal,
session: sessionVal,
createdAt: Date.now()
});

alert("Result Saved ✔");
};

</script>

</body>
</html>
