<!DOCTYPE html>
<html>
<head>
<title>Star Academy Admin</title>

<style>
body{
font-family:Arial;
background:#0a0a0f;
color:white;
}

.card{
max-width:750px;
margin:auto;
background:#16161f;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
}

button{
background:#00e5c0;
border:none;
cursor:pointer;
font-weight:bold;
}

.hidden{display:none;}
.menu button{margin-top:8px;}
h2,h3{color:#00e5c0;}
a{color:#00e5c0; cursor:pointer;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card menu">
<h2>DASHBOARD</h2>
<button onclick="showSection('studentSection')">Add Student</button>
<button onclick="showSection('resultSection')">Add Result</button>
<button onclick="goHome()">Home</button>
</div>

<!-- ADD STUDENT -->
<div id="studentSection" class="card hidden">

<h3>Add Student</h3>
<a onclick="goHome()">← Back</a>

<input id="name" placeholder="Full Name">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="state" placeholder="State">
<input id="lga" placeholder="Local Government">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone Number">
<input id="emailStudent" placeholder="Student Email">

<select id="department">
<option value="">Department</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
</select>

<select id="level">
<option value="">Level</option>
<option>Primary</option>
<option>Junior Secondary</option>
<option>Fresh Class</option>
<option>AI Class</option>
<option>Level 1</option>
<option>Level 2</option>
<option>Level 3</option>
</select>

<select id="schoolType">
<option value="">School Type</option>
<option>Private</option>
<option>Public</option>
</select>

<input id="schoolName" placeholder="School Name">

<select id="graduated">
<option value="">Graduated</option>
<option>Yes</option>
<option>No</option>
</select>

<button onclick="addStudent()">Save Student</button>

</div>

<!-- ADD RESULT -->
<div id="resultSection" class="card hidden">

<h3>Add Result</h3>
<a onclick="goHome()">← Back</a>

<input id="studentID" placeholder="Enter Student ID" oninput="loadStudent()">

<p id="studentName"></p>

<div id="subjects"></div>

<select id="term">
<option value="">Term</option>
<option>First Term</option>
<option>Second Term</option>
<option>Third Term</option>
</select>

<input id="session" placeholder="Session e.g 2025/2026">

<button onclick="saveResult()">Save Result</button>

<div id="resultPreview" class="card hidden"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, runTransaction,
query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA04XI79y51iG-UK4sprC_JvTiXqy5is9c",
authDomain: "star-academy-system.firebaseapp.com",
projectId: "star-academy-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async function(){
try{
await signInWithEmailAndPassword(auth,email.value.trim(),password.value.trim());
loginBox.style.display="none";
dashboard.classList.remove("hidden");
}catch(e){
msg.innerHTML = e.message;
}
};

/* NAV */
window.showSection = function(id){
document.querySelectorAll("#dashboard .card").forEach(c=>{
if(!c.classList.contains("menu")) c.classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
};

window.goHome = function(){
document.querySelectorAll("#dashboard .card").forEach(c=>{
if(!c.classList.contains("menu")) c.classList.add("hidden");
});
};

/* ID GENERATOR */
async function generateID(dept){
const ref = doc(db,"meta","counter");

const num = await runTransaction(db, async (tx)=>{
const snap = await tx.get(ref);
let count = snap.exists()?snap.data().count+1:1;
tx.set(ref,{count});
return count;
});

let code = dept==="Science"?"SCI":"ART";
return `STA/2026/${code}/${String(num).padStart(5,"0")}`;
}

/* ADD STUDENT (FIXED 100%) */
window.addStudent = async function(){

const data = {
name: name.value.trim(),
age: age.value.trim(),
gender: gender.value,
state: state.value.trim(),
lga: lga.value.trim(),
address: address.value.trim(),
phone: phone.value.trim(),
email: emailStudent.value.trim(),
department: department.value,
level: level.value,
schoolType: schoolType.value,
schoolName: schoolName.value.trim(),
graduated: graduated.value
};

/* FIXED VALIDATION (NO FALSE BLOCK) */
for (let k in data){
if(data[k] === ""){
alert("Fill all fields ❗");
return;
}
}

let id = await generateID(data.department);

await addDoc(collection(db,"students"),{
studentID:id,
...data,
createdAt:Date.now()
});

alert("Student Added ✔ " + id);

/* CLEAR */
document.querySelectorAll("#studentSection input").forEach(i=>i.value="");
document.querySelectorAll("#studentSection select").forEach(s=>s.value="");
};

/* LOAD STUDENT */
window.loadStudent = async function(){

let id = studentID.value.trim();

if(!id){
studentName.innerHTML="";
subjects.innerHTML="";
return;
}

const q = query(collection(db,"students"), where("studentID","==",id));
const snap = await getDocs(q);

if(snap.empty){
studentName.innerHTML="Student not found ❌";
subjects.innerHTML="";
return;
}

let s = snap.docs[0].data();

studentName.innerHTML =
`Name: ${s.name} | Class: ${s.level} | Dept: ${s.department}`;

loadSubjects(s.department);
};

/* SUBJECTS */
function loadSubjects(type){

let list = type==="Science"
? ["English","Biology","Chemistry","Physics","Mathematics"]
: ["English","Literature","Government","Economics","Islamic Studies"];

subjects.innerHTML="";

list.forEach(sub=>{
subjects.innerHTML += `<input class="score" type="number" placeholder="${sub}">`;
});
}

/* SAVE RESULT + PREVIEW */
window.saveResult = async function(){

let id = studentID.value.trim();
let termVal = term.value;
let sessionVal = session.value;

if(!id || !termVal || !sessionVal){
alert("Fill all fields");
return;
}

let scores = document.querySelectorAll(".score");

let total = 0;
scores.forEach(s=> total += Number(s.value||0));

let avg = total / scores.length;

let grade = avg>=70?"A":avg>=60?"B":avg>=50?"C":"F";
let status = total>=250?"PASS":"FAIL";

await addDoc(collection(db,"results"),{
studentID:id,
total,
average:avg,
grade,
status,
term:termVal,
session:sessionVal,
createdAt:Date.now()
});

/* PREVIEW */
resultPreview.classList.remove("hidden");
resultPreview.innerHTML = `
<h3>Result Summary</h3>
Total: ${total}<br>
Average: ${avg.toFixed(2)}<br>
Grade: ${grade}<br>
Status: ${status}<br>
`;

alert("Result Saved ✔");
};

</script>

</body>
</html>
